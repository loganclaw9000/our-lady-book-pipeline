[project]
name = "book_pipeline"
version = "0.1.0"
description = "Autonomous book-drafting pipeline for Our Lady of Champion — voice-FT drafter + frontier critic + typed RAG"
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = {text = "Proprietary"}
authors = [{name = "Paul Logan"}]
dependencies = [
  "anthropic>=0.96.0,<0.97",
  "pydantic>=2.10",
  "pydantic-settings>=2.7",
  "PyYAML>=6.0",
  "lancedb>=0.30.2",
  "sentence-transformers>=3.3",
  "httpx>=0.27",
  "tenacity>=9.0",
  "python-json-logger>=3.0",
  "xxhash>=3.0",
  "tiktoken",
]

[project.scripts]
book-pipeline = "book_pipeline.cli.main:main"

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-asyncio",
  "ruff",
  "mypy",
  "pre-commit",
  "rich>=13.0",
  "import-linter>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/book_pipeline"]

[tool.hatch.build.targets.sdist]
include = ["src/book_pipeline", "config", "README.md"]
