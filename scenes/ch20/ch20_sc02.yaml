# Ch 20 sc02 — The dying Mexica priest's account; the equation completes.
chapter: 20
scene_index: 2
beat_function: |
  A few days later. Tlaxcala, the holding house where a captured
  Mexica priest is being kept under Tlaxcalan custody — old, dying
  of something not smallpox (a tumor, exhaustion, age), allowed
  visitors because the Tlaxcalans owe him a category of respect
  even now. Malintzin goes alone, without Spanish escort, in Nahua
  dress. She brings water and a clean cloth. He recognizes the
  dialect of her childhood. She asks him, plainly, what *ixiptla*
  acceptance actually does inside the engine, not in the public
  theology but in the rite the priesthood does not say in front
  of anyone. He tells her. The Quetzalcoatl-caste apex needs a
  willing knower, not a frightened captive — the consent is what
  the seal eats; the bone is the housing. The lesser Flower-War
  fuel runs the smaller engines because the deaths are at scale,
  not because the deaths are good. He says all this the way
  Bernardo said the Inquisition account: like a man describing
  plumbing he has known all his life. Then Malintzin sets the
  two accounts beside each other in her head and the two
  vocabularies disappear and the same mechanism is left standing
  in the middle of the room. She thanks him in the formal
  ceremonial register. He nods. He dies the next morning. Show:
  her walking back to the Spanish camp through the Tlaxcalan
  market, the noon light on her hands, her face composed,
  nothing visibly changed. Inside her, the book's theological
  core has just snapped into one shape. Establish: the
  metaphysics is now assembled, not deduced — she heard it
  twice, in two languages, from people who had no reason to lie.
