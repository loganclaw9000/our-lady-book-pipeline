# Ch 19 sc03 — Itzcoatl arrives. The triangle closes (Andrés sees only the outside of it).
chapter: 19
scene_index: 3
beat_function: |
  Early spring 1521. A Mexica nobleman in civilian clothes walks
  into Tlaxcala alone and asks audience with Cortés. The pickets
  send word up the chain. Andrés is on duty as a junior pilot in
  attendance at Cortés's council chamber that afternoon — *San
  Esteban*'s wrong hum still resident under his collarbone from
  the morning's walk-rite — and so he is in the chamber when the
  nobleman is brought in. Cortés is at the far end of the table.
  Aguilar is present. Malintzin is at Cortés's left hand, the way
  she has been since the autumn — visibly pregnant now, six or
  seven months along, the pregnancy not hidden, the Spanish
  having absorbed it into the camp's ambient knowledge without
  comment. The nobleman sits across from Cortés. He gives his
  name: Itzcoatl, of Texcoco, pilot of *Obsidian Mirror* — the
  Tezcatlipoca-class engine the Spanish know by reputation from
  the Templo Mayor and from Otumba, where it harassed them on
  the right flank. Andrés has heard the name *Obsidian Mirror*
  in operational briefings; he attaches the man across the table
  to the engine in his head and finds the sum unstable. The man
  is calmer than Andrés would be in his place. Andrés watches
  Malintzin translate. He has been watching Malintzin translate
  for two years; he can read her now better than he can read his
  own confessor. Something in her cadence stutters — not in the
  rate, not in the volume, but in the small held breath she takes
  before rendering one of Itzcoatl's sentences into Spanish, a
  half-second longer than her habit. Andrés notes it. He does not
  know what triggered it. Itzcoatl's sentence, as Malintzin
  delivers it into Castilian, is a lineage statement: he names a
  sister, Xochitl Tlapala, widowed at the massacre, of a Mexica
  house in Tenochtitlan. The name passes through the room and
  registers, with Cortés, only as one more datum of standing. It
  registers with Andrés as a name he has never heard. It
  registers with Malintzin as the closing of a circuit the reader
  needs to feel close, even though Andrés cannot — show, through
  Andrés's eyes, only the small evidences: the half-second held
  breath; the way Malintzin's hand goes briefly still on the
  table edge; the way she finishes the sentence in Castilian
  exactly as a translator should. The negotiation proceeds —
  preliminaries only, nothing decided, Itzcoatl will return in
  some weeks with Mirror or he will not. The meeting ends. As the
  chamber empties Andrés sees Malintzin walk, not toward Cortés
  for debrief, but down a short corridor toward the household
  staff rooms. She does not return that hour. Late that night
  Andrés is at Bernardo's lodging — they had been going to
  continue last week's conversation about the Reconquista martyrs
  — and Malintzin is already there, sitting at Bernardo's table.
  Andrés has not seen them in private together before. He
  withdraws without speaking, the door pulled to behind him,
  Bernardo's hand raised in a half-acknowledgment that means
  *another night.* Andrés walks back to his quarters under the
  cold sky and registers, the way he has been registering things
  for months without articulating them, that there are
  conversations now happening among the people he loves that he
  is not party to, and that whatever has just been spoken in
  that room is going to load-bear something in the months
  ahead. *San Esteban*'s wrong hum is the only company he has on
  the walk back. Establish: the Itzcoatl-Cortés meeting witnessed
  by Andrés (Itzcoatl's defection now mechanically queued — Ch
  20+ will close it); the Xochitl-Malintzin-Itzcoatl triangle
  closed off-page in Malintzin's interior — Andrés sees only the
  surface evidences (held breath, still hand, the corridor exit,
  the late-night meeting at Bernardo's), so the reader reads the
  closure through the missing center; Malintzin → Bernardo as
  the new private channel; Andrés's growing awareness that the
  moral architecture of the campaign is being rebuilt by other
  hands than his.
