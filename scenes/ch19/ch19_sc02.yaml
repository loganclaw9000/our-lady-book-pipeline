# Ch 19 sc02 — Don Fernando Ixtlilxochitl. Bernardo's heresy at night.
chapter: 19
scene_index: 2
beat_function: |
  Two threads, same evening. First: Don Fernando Ixtlilxochitl —
  Itzcoatl's cousin — has been in Tlaxcala for some weeks already,
  having defected formally to the Spanish during the regroup. He
  has brought three engines (Texcocan-pattern, Tezcatlipoca-class
  variants, second-class), a retinue of Texcocan nobles, and a
  standing offer of fifty thousand indigenous warriors over the
  course of the campaign. He has been baptized. He goes by Don
  Fernando Ixtlilxochitl now. Andrés meets him at a captain's
  council in Cortés's Tlaxcalan headquarters. Show: Ixtlilxochitl
  in Spanish dress, fluent Castilian (better than Andrés's own
  Latin), an easy charm Andrés cannot place — a man who can hold a
  room without raising his voice, who calibrates each Spaniard at
  the table to within a half-degree, who has clearly been
  preparing for this campaign in his head for years. Andrés does
  not trust him and cannot articulate why. He files the
  un-articulated distrust. Second thread, later, at night: Andrés
  and Fray Bernardo at Bernardo's small writing-table in a
  borrowed Tlaxcalan house. Bernardo has been teaching Nahuatl in
  the convent and learning it back from his pupils — slow, accented,
  effortful, the work of a man rebuilding his vocation in a new
  language. They drink water (Bernardo no longer drinks wine
  since the night of the massacre). Bernardo says, out loud, for
  the first time, the heresy he has been turning over since
  Cholula: that the Spanish are not winning because God is with
  them. They are winning because they cheat. Powder. Steel. Smallpox
  rumors from the coast that he does not name yet but has been
  hearing. Reliquaries that outweigh and outrange what they meet.
  Tlaxcalan allies bought by old enmities. The unvarnished
  arithmetic of the campaign. He is not whispering. He is not
  shouting. He is testing the sentence in the dim of the small
  room, with the only Spaniard he has decided he can test it on.
  Andrés says nothing for a long time. He does not refute it. He
  does not affirm it. He registers that he cannot refute it.
  Establish: Ixtlilxochitl as charming, fluent, unaccountable —
  set up for his pivot in Ch 23; the un-articulated distrust as
  an asset Andrés will later be able to articulate; Bernardo's
  heresy stated cleanly so the reader hears it in his voice for
  the first time; the smallpox rumor seeded in Bernardo's
  hesitation (Ch 20 reveal); the deepening of the Andrés-Bernardo
  axis as the moral spine of Andrés's arc.
