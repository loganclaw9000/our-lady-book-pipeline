  The Tlaxcalan war opens. Tlaxcalan forces are independent of the
  Triple Alliance, surrounded, hardened by decades of Flower Wars.
  They field teōmecahuītlī — Mexica-aesthetic god-engines fueled by
  Flower War captives. Andrés first encounters Tlaxcalan engines
  on a hillside above a salt-flat: six engines visible, copper-gilt
  Huitzilopochtli-class, their hummingbird helms catching the
  morning sun. Setup of the war's character: independent Nahua,
  not allies of Mexica, willing to die in numbers. Andrés feels
  for the first time the weight of fighting an opponent whose
  engines are theologically powered by the same physical principle
  as his own — Sanctified Death — but with completely incompatible
  metaphysics. The opening skirmish ends without engagement; the
  Tlaxcalans withdraw to higher ground. Both sides prepare.
