# Ch 13 sc03 — Approach to Cempoala. Battle prep.
chapter: 13
scene_index: 3
beat_function: |
  Mid-to-late May 1520. The expedition reaches the foothills above
  Cempoala, where Narváez has occupied the Totonac town and is
  quartered in the temple precinct. Cortés has sent feeler letters,
  envoys, bribes — a quiet campaign of suborning Narváez's captains
  before the engines clash. Andrés is on overnight standby in *La
  Niña*'s cradle as the rain comes in. Show the mecha-procedural
  detail of a night assault preparation: monstrance seals checked
  by candle, the relic-bones reseated by the adorator-priest who
  prays through the rite by name (Flora of Córdoba, nine years old,
  martyred under the Caliphate, please grant your servant strength
  this night), the engines walked into pre-position in a downpour
  that hides their footfalls. Andrés overhears two of Cortés's
  captains saying that several of Narváez's own pilots have already
  been bought. The battle, when it comes, is going to be quick. He
  sleeps two hours in the cockpit harness, which is the way he
  sleeps best now — the hum at his back. The chapter ends before
  the battle begins. The build-up is the point. Establish for Ch
  14: the asymmetric quiet of a force that has already been bought
  before it has fought; that Malintzin is somewhere in the camp
  tonight and that her translation work has been the lever
  Cortés used; the rain that will be on Malintzin's face the
  next morning when she looks into the obsidian mirror.
pov: "Andrés de Mora"
date_iso: "1520-05-27"
location: "Foothills above Cempoala, Spanish camp in the rain at night"
