# Ch 13 sc02 — On the march. The recognition.
chapter: 13
scene_index: 2
beat_function: |
  Early May 1520. The expedition is on the road from Tenochtitlan
  toward the coast — across the lakeshore, then the pass at
  Río Frío, descending toward Cholula and Tlaxcala, and onward.
  Tlaxcalan teōmecahuītlī walk in the column. Malintzin rides
  forward with the captains. Andrés is in *La Niña*'s cradle for
  the long marches, walking her on her own legs over the rougher
  ground (uses fuel; the adorators wince every time). Show the
  texture of the ride: the engines spaced for the road's load
  capacity, the dust kicked by twelve animated tons per stride,
  the way the line of Reliquaries throws a single moving shadow
  across the morning hills. Mid-march Andrés realizes — clearly,
  for the first time — that Cortés is going to risk the entire
  expedition on this gamble. Not because the gamble is sound but
  because Cortés cannot tolerate the alternative (Velázquez's
  men taking the prize). The recognition lands in Andrés like a
  small hot stone. He examines it. He notices that his faith in
  Cortés's judgment has been, all along, a kind of piety —
  indistinguishable in his interior from the faith he places in
  the saint whose bones power his engine. The recognition does
  not break the piety. It names it. He rides the rest of the
  day in silence. Bernardo, riding nearby on a mule, watches
  Andrés watching the column and says nothing. Establish: the
  rate of fuel consumption on long marches (will matter at
  Otumba and on the return); the felt weight of the gamble;
  Andrés's slow, mechanical re-cataloging of his own beliefs.
pov: "Andrés de Mora"
date_iso: "1520-05-08"
location: "Road from Tenochtitlan to the coast, near the pass at Río Frío"
