# Ch 23 sc02 — The cousins ride the causeway side by side.
chapter: 23
scene_index: 2
beat_function: |
  Early May 1521. The brigantines have been hauled over the
  mountains on the backs of thousands of indigenous porters
  and reassembled on Lake Texcoco; the ring is closing
  around Tenochtitlan. Itzcoatl and Ixtlilxochitl — Don
  Fernando Ixtlilxochitl now, baptized, in Spanish steel
  over a Texcocan undertunic — ride side by side along the
  northern causeway at the head of the Texcocan contingent.
  Behind them: three engines including Ixtlilxochitl's
  Huitzilopochtli-caste giant (a deliberate theological
  provocation — the patron god of the Mexica, piloted
  against them by their Texcocan cousin). Behind those:
  fifty thousand indigenous warriors, the historical
  figure, mostly Texcocan and Tlaxcalan, in column.
  *Obsidian Mirror* walks behind Itzcoatl on her own legs.
  Ixtlilxochitl talks the whole length of the causeway:
  reconstruction, the new Texcoco he will build, the
  Spanish church he will fund, the Latin school for
  Texcocan boys, the way the city will breathe again after
  the fever. He is gracious. He is untroubled. He converted
  three years ago and has already done his grieving in
  private; he is past it. His calm is its own accusation.
  Itzcoatl cannot speak. He rides beside his cousin and
  cannot answer because anything he says will reveal that
  he has not yet finished the choice he has formally made.
  Show: the causeway underfoot, lake on both sides, the
  city visible across the water with smoke already rising
  from the suburbs the Tlaxcalan vanguard has burned, the
  way *Mirror*'s hum and the Huitzilopochtli engine's hum
  do not harmonize and the air between the two engines
  has a faint pressure to it. Establish: the two modes of
  defection set side by side — Ixtlilxochitl chose early
  and pragmatically and won, Itzcoatl chose late and
  reluctantly and is paying now; the
  Huitzilopochtli-against-the-Mexica image as the book's
  most violent theological inversion; the silence as the
  scene's main verb.
pov: "Itzcoatl"
date_iso: "1521-05-15"
location: "Northern causeway across Lake Texcoco, approaching Tenochtitlan"
