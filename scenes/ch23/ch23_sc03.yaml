# Ch 23 sc03 — Itzcoatl in Mirror's cockpit at night, the arithmetic.
chapter: 23
scene_index: 3
beat_function: |
  That night. *Obsidian Mirror* in her makeshift cradle in
  the Spanish camp on the lake shore. Itzcoatl in the
  cockpit alone, hum running low, the cockpit's small
  Tezcatlipoca brazier (kept lit since Ch 4) burning a
  pinch of copal. He has the cockpit hatch open onto the
  night; he can hear Spanish voices, Tlaxcalan voices,
  the clink of brigantine fittings on the lake, somewhere
  a Castilian soldier singing. He thinks through, plainly,
  the proposition he has just enacted: a living Texcoco
  under Spanish rule is preferable to a dead Texcoco under
  a dying Mexica empire. He has said this to himself many
  times since his mother and Xochitl died (Ch 21). He
  says it again. He believes it less each time. The house
  is dead already; there is no Texcoco left for which his
  loyalty mattered. He is fighting for a shell. He does
  not say this aloud, even to *Mirror*, even in the
  ceremonial register his mother used in her last
  sentences he could not parse. Show: his hand on the
  obsidian-handled stick, the cockpit's familiar
  geometry, the engine's awareness of him (Mexica
  god-engines are not personalities the way Reliquary
  saints are, but *Mirror* has been with him a decade and
  the bond is its own kind of presence), the moment the
  hum drops a half-tone as he thinks about Ixtlilxochitl
  and then settles back when he stops. Tomorrow he will
  walk her against the Mexica engine corps he trained
  with. Tonight he sits with the arithmetic. He does
  not pray. He will not pray again. Establish: the
  defection completed in his interior, not just in his
  papers; the engine still with him, which is the only
  loyalty left intact; the bridge into the siege proper
  in Ch 24-25; the line *fighting for a shell* as the
  echo Ch 27 will close on when Malintzin nods at him
  in the ruins.
