# Ch 14 sc03 — Recommitment. The first directing translation.
chapter: 14
scene_index: 3
beat_function: |
  Evening of the same day, or the next. The expedition camps in
  the high country. Cortés holds a meeting with two of the
  newly-absorbed Narváez captains, a Tlaxcalan teōmachtiani
  liaison, and Aguilar. Malintzin translates. The conversation is
  about what the absorbed force will do in Tenochtitlan when they
  arrive: who reports to whom, how the new pilots are quartered,
  whether the Tlaxcalans are told that Narváez's men have been
  absorbed (and how). For the first time consciously, Malintzin
  lets a pause sit longer than it needs to before rendering one
  of Cortés's sentences into Nahuatl, then re-shapes the sentence
  on its way through her mouth — a softer phrasing toward the
  Tlaxcalan, a sharper one toward the Narváez captain, neither
  quite what Cortés said. No one in the room can audit her. She
  watches the meeting bend, by a degree, in the direction she has
  pushed it. She does not enjoy it. She files it. After the
  meeting she walks out to the picket line where the Reliquaries
  are at rest. La Niña kneels in her cradle for the night. The
  hum is steady. Malintzin stands there for a moment in the dark
  — not praying, exactly — and then goes back to her tent. She
  does not tell anyone she is pregnant. She will not tell anyone
  for months. Establish: the mechanism of directing translation
  (the reader sees Malintzin do it once, cleanly, with the
  audit-impossibility made explicit, so every later translation
  scene reads under the shadow of this technique); the
  silence around the pregnancy; her recommitment to the road
  forward. The midpoint hinge is closed.
pov: "Malintzin"
