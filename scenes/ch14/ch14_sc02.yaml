# Ch 14 sc02 — The mirror. Mirror Moment proper.
chapter: 14
scene_index: 2
beat_function: |
  Two days later. The expanded expedition is on the road back
  toward Tenochtitlan. Malintzin is in a private corner of the
  baggage train at midday, washing her face from a basin during
  a column halt. From a leather pouch at her belt she takes out
  the polished obsidian mirror Xochitl Tlapala gave her in
  Tenochtitlan during their court-protocol lessons — small, the
  size of a palm, the back rimmed with worked silver, the kind
  of object a Mexica noblewoman would carry to inspect her own
  face before audience. She looks at herself. She is eighteen.
  Her hair has been pulled back the Spanish way for three months.
  In the mirror she sees her own face and behind it, in the
  curved black depth, the bones of a recognition she has been
  putting off: she has missed two cycles. She has been nauseous
  in the mornings at Cempoala. She is pregnant. By Cortés. The
  understanding arrives intact, in one piece, and stays. Then the
  second understanding arrives behind it: at Cholula she
  translated to survive. At Cempoala she translated to direct.
  The bribery of Narváez's captains, the language she put into
  their heads — that was not survival. That was choice. She has
  crossed a threshold. She does not know what she has chosen.
  She knows she chose it. The mirror moment proper. No tears.
  No collapse. A long, exact accounting. She puts the mirror
  back in the pouch. She rejoins the column. Establish for the
  back half of the book: Malintzin moves from reactive to active
  here; from this point forward she translates to direct, and the
  reader should be able to feel the shift in her cadence in
  every later scene. Establish for Ch 19: the mirror itself, as
  a physical object with provenance through Xochitl, will return
  when the Xochitl thread closes silently in Malintzin's head.
