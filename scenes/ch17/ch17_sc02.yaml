# Ch 17 sc02 — La Niña goes down. Bernardo on the causeway.
chapter: 17
scene_index: 2
beat_function: |
  The collapse. Some unmeasured time after midnight. The plank
  bridge ahead of Andrés has been overturned by Mexica fighters
  in canoes during a chaotic moment between the third and fourth
  causeway gap. The column halts and compresses. Two Reliquaries
  ahead of La Niña try to brace the gap themselves, kneeling
  shoulder-to-shoulder to make a body-bridge for the foot soldiers
  to cross — the saint-fueled gait of a Reliquary is not designed
  for this and the engines slip on rain-slick stone. One of them
  goes over the side into the lake, a sixty-foot Reliquary called
  *Santa Catalina del Aljarafe* (powered by the bones of Catherine
  of Alexandria, a relic acquired in Seville for the expedition)
  — her monstrance cracks against the causeway edge as she falls,
  her hum cuts mid-pitch like a snapped string, she goes under
  the dark water. Andrés sees this through La Niña's faceplate
  and has time to register: that is what it looks like; that is
  what is going to happen to the rest of us. A second Reliquary
  follows. Then it happens to La Niña. A boulder thrown — by
  pivot or by trebuchet from a Huitzilopochtli engine at the
  causeway's lake-bank approach, the source impossible to confirm
  in the dark and the rain — strikes La Niña on her left
  shoulder, glances up, and crushes the monstrance housing on her
  chest. The seal breaks. Andrés feels Flora — feels the small
  warm dry presence that has been at his back his whole pilot's
  life — leave the cockpit through the broken seal in a breath
  he can almost hear. La Niña goes down on her knees. Then
  forward. Then over the causeway edge. Andrés gets the cockpit
  hatch open by main strength as she falls and is in the water
  before she hits — the lake is shallow at this section, three or
  four feet only — he goes in waist-deep and then cuts free of
  the harness entirely, soaked, bootless, the bones of Flora of
  Córdoba sinking somewhere into the silt of Lake Texcoco around
  him. He drags himself up to the causeway's stones with his own
  two hands. Two-thirds of the Spanish force will die tonight.
  Andrés is one of the third who will not. As he is crawling back
  onto the causeway, he sees Bernardo. Bernardo is walking the
  wrong direction — back toward the city, against the flow of the
  fleeing column — and he is carrying a wounded Tlaxcalan
  teōmachtiani, a man too large for him, his arms under the man's
  arms, stumbling and lifting and stumbling. The teōmachtiani is
  conscious; she is a woman; her face is bloody. Bernardo's robes
  are black with water. He does not look at Andrés. Andrés
  watches for three seconds. He could call out. He could help.
  He keeps walking, the wrong direction, the right direction, his
  direction — toward the far shore, away from the city, away from
  Bernardo and the Tlaxcalan Bernardo is not going to be able to
  carry that far. He will remember those three seconds for the
  rest of his life. Bernardo survives the night. He does not
  speak of it. Establish: La Niña destroyed, Flora's bones lost,
  Andrés a pilot without a saint (sets up Ch 19's *San Esteban*
  re-fitting); the Bernardo three-second encounter (so it can
  return as Andrés's recurring memory through to the climax);
  the felt mass of the saint leaving the cockpit as a real
  metaphysical event, not metaphor.
