# Ch 21 sc03 — The ixiptla pipeline collapses; Cuauhtémoc elevated.
chapter: 21
scene_index: 3
beat_function: |
  Late December 1520 into January 1521. Itzcoatl rides back
  toward Tenochtitlan along the shore as far as the sealed
  causeway permits, then loops south to the engine cradles
  outside the city where the Mexica engine corps has set up
  a forward staging because the Templo Mayor itself is half-
  dark. The *ixiptla* fuel pipeline — already wounded by
  Alvarado's massacre at the Templo Mayor (Ch 15) — collapses
  entirely under the plague: the priests who run the rite are
  dying, the captives held for Flower-War fuel are dying in
  their pens, the Quetzalcoatl-caste apex needs willing knowers
  who are also dying. The Great Engine of the Templo Mayor is
  starving. Lesser god-engines across the valley are going
  dormant for lack of fuel — Itzcoatl walks past two of them
  in their cradles, hums absent, attendants standing around
  with nothing to feed them. The Spanish are immune to the
  disease. They do not know why. Itzcoatl, who has now had
  the two-thirds revelation from a Texcocan tlamatini who
  came back with him from the lake (offstage, mirroring
  Malintzin's Ch 20), knows why: something arrived in their
  blood that the Mexica fuel chain cannot answer. Cuauhtémoc,
  young and defiant, is elevated as tlatoani after Cuitláhuac.
  The Mexica will fight. Itzcoatl, watching the new tlatoani's
  installation from the back of the crowd, understands here
  — clearly, without rhetoric — that they will lose. Not
  because their enemies are stronger. Because their fuel is
  dead. And the last thing his house might have been
  defending is already gone. Establish: the engine-fuel
  collapse as the structural reason Mexica military strength
  cannot recover; Itzcoatl's interior verdict that the war
  is already lost in the engines; the bridge to Ch 23's
  defection — when he crosses to the Spanish, he is not
  abandoning a winning side; he is choosing which kind of
  surviving Texcoco will exist on the other side.
