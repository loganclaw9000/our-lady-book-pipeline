# Ch 21 sc02 — Xochitl and her children dead; Tenochtitlan sealed.
chapter: 21
scene_index: 2
beat_function: |
  Three days after his mother's death. Itzcoatl is back at the
  Texcoco lake shore preparing to return to Tenochtitlan when
  a runner arrives, sent by a cousin in the Mexica capital:
  Xochitl Tlapala — his elder sister, the woman from Ch 12 sc03
  who was teaching the strange Nahua girl Mexica court protocol
  — has died of smallpox in her husband's house. Her two
  children died within the same week. Itzcoatl receives this
  standing up. He thanks the runner. He sends him to be fed.
  He walks down to *Obsidian Mirror*'s cradle and stands at
  her feet for a long time. The city is sealed against the
  contagion; he cannot go to Tenochtitlan to claim the bodies
  or stand the rites. He cannot even confirm by his own eyes.
  His entire house is gone in a fortnight — mother, sister,
  her children, the line that named him. Show: the engine's
  hum, low and steady, indifferent; the way the lake reflects
  Tenochtitlan across the water as a smear of smoke from
  funeral fires; Itzcoatl's hand on the engine's leg, the
  obsidian skin of *Mirror* warmed by afternoon sun. He does
  not weep. He does not pray. He computes. The thing he has
  been refusing to defect for is, in this hour, dead of a
  disease the Spanish brought and did not mean to bring. The
  moral gradient he was clinging to has come apart in his
  hands. Establish: the ground is gone; what remains for him
  to defend is a shell; the seed of Ch 23's commitment is
  planted here as a quiet arithmetic, not a cry.
