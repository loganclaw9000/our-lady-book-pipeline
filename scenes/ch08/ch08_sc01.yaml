  expecting parley. The trap is closing. Andrés stands inside the
  cockpit, helmet off, looking through the open faceplate at the
  noblemen filing into the courtyard. He has not been told what is
  going to happen, but he has been told to be ready. Establish: the
  texture of imminent atrocity (men in feathered cloaks crossing the
  threshold; Spaniards behind every column; Tlaxcalans visible
  through the gate beyond), Andrés's premonition, the dormant
  Quetzalcoatl engine visible in the temple precinct — colossal,
  asleep, never seen by Spanish eyes before.
