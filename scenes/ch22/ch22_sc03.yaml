# Ch 22 sc03 — On the march; Malintzin commits in motion.
chapter: 22
scene_index: 3
beat_function: |
  Mid-April 1521. The expedition is moving — the brigantine
  pieces on the backs of thousands of indigenous porters,
  Spanish cavalry and pikemen in the column, Tlaxcalan
  warriors flanking, the Reliquaries (*San Esteban del Río*
  among them) spaced along the line for road load. Malintzin
  rides forward near Cortés as she has every march since
  Ch 7. She is six months pregnant; a litter has been
  offered; she has refused it. Show the texture of the
  march: the road cresting toward the Lake Texcoco basin,
  the smoke from valley villages already showing on the
  horizon, the Spanish soldiers giving her a wide berth she
  does not need. Cortés asks her to render a Tlaxcalan
  captain's request about water rationing for the porters.
  She does — accurately, but she chooses her Spanish verbs
  with care, weighting the request slightly more strongly
  than the Tlaxcalan phrasing strictly warrants, because
  the porters are dying of thirst on this stage and the
  captain is too proud to put it that way. Cortés grants
  the ration. The captain thanks her in Nahuatl. She nods.
  This is the *power within* at the granular scale — one
  ration, one weighted verb, one set of porters who will
  reach the lake alive instead of being buried at the
  pass. Multiplied over the months she has left. She is
  not saving the city. She is saving sentences. Establish:
  the *power within* enacted in a small concrete decision
  the reader can audit; her continuing function as
  translator now operating in full knowledge of what the
  engines run on; bridge to Ch 24's *convergence* with
  Bernardo on the lake shore.
pov: "Malintzin"
