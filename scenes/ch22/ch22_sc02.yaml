# Ch 22 sc02 — Andrés asks if she believes she is doing the right thing.
chapter: 22
scene_index: 2
beat_function: |
  A few days later. Tlaxcala, late afternoon. Andrés finds
  Malintzin where the brigantine sections are being lashed for
  transport over the mountains — she is standing watching the
  Tlaxcalan porters assemble a mast cradle. He has been
  thinking, since the three days he could not leave his
  quarters in Ch 20, about what she said. He asks her,
  carefully, in the Spanish she taught him to read his own
  language back to him in: *do you believe you are doing the
  right thing?* She turns. She considers the question with
  the same attention she gives a Nahuatl term that has no
  Spanish equivalent. She says: *I believe I am doing a
  thing.* He does not laugh. He does not press. He stands
  with her for a while watching the porters. He understands
  that this is the closest thing either of them will say. He
  understands, also, that the woman in front of him is
  carrying a child whose father is the man whose orders have
  fed *La Niña de Córdoba* and now feed *San Esteban del
  Río* and will, in a few months, ask Andrés for things he
  has not yet imagined. He says nothing about the
  pregnancy. She says nothing about the engines. They walk
  back toward the camp together, separately. Establish: the
  closest the book gets to a love scene between them, on
  purpose understated; the phrase *I believe I am doing a
  thing* as a pivot line that Bernardo's martyrdom in Ch 26
  will echo back inverted; Andrés as a man now actively
  choosing to keep working with her despite knowing what
  she knows.
