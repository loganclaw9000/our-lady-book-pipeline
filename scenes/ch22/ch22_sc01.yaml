beat_function: |
  STRICT POV: MALINTZIN ONLY. Previous chapter was ITZCOATL POV;
  do NOT slip into ITZCOATL's interior or recycle their lore. The
  other characters appear from the outside, through MALINTZIN's eyes.

  Spring 1521. Tlaxcala, a few weeks after the Ch 20
  revelation. Malintzin in the small room she has been given
  in the Spanish quarter — pallet, table, water jar, a single
  shuttered window onto a yard where two Tlaxcalan women are
  weaving. She is visibly pregnant now. No one in the camp
  has mentioned it; she has not mentioned it. Show her at the
  table working through the previous day's interpretation
  notes — names, place words, two phrases of ecclesiastical
  Latin she is still settling into her Nahua mouth — and
  underneath the routine, in a layer she does not show
  anyone, working through the choice that has been waiting
  for her since she set Bernardo's account beside the Mexica
  priest's. The two systems are one mechanism in two
  dialects. The conquest is not a clash of civilizations. It
  is the same machine grinding against itself. She could
  walk away — Tlaxcalan kin would shelter her, the pregnancy
  would be a reason no one would question. She does not. She
  thinks through, in order, what *staying* means: that an
  awake translator in the room can soften some sentences,
  preserve some names, choose which Latin verb stands in for
  which Nahuatl idiom. None of this saves the city. Some of
  it saves a word, a person, a transcription that will
  outlive the burning. She is not hoping. She is choosing to
  be complicit on purpose, in a catastrophe she now knows
  she cannot prevent, because the alternative is to leave
  the room to people who do not know what they are doing.
  Establish: the *power within* as a moral arithmetic, not
  a swell; her choice as a deliberate compromise rather
  than a redemption; the pregnancy as ground-state fact,
  unspoken but in every line of her posture.
