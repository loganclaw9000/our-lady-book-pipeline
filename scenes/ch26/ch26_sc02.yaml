# Ch 26 sc02 — Bernardo's confession; the killing; the fusion.
chapter: 26
scene_index: 2
beat_function: |
  Continuing from sc01. Bernardo walks to the stone
  block at *San Esteban del Río*'s feet. He turns to
  face the witnesses. He speaks, in Spanish first so
  the Castilian soldiers will hear him, then in
  Nahuatl (which he has learned well enough by now to
  do this himself, though Malintzin stands close
  enough to correct a clause if he stumbles, and he
  does not stumble). His confession is the chapter's
  hinge and must be delivered in full: he names what
  he is about to become; he names the mechanism — the
  consent, the bone, the monstrance, the fused
  apex-equivalent for one hour; he names Flora of
  Córdoba, the martyred child whose bones have
  powered *La Niña de Córdoba* since Ch 1, and he
  says her name aloud, *Flora*, the first time her
  name is spoken in the book — *this is what she was,
  and I choose it.* He says he weaponizes the
  founder of his order — Francis of the radical
  poverty, the cord he wears — as the ritual
  instrument, and he is aware of the horror of this,
  and he names that horror so the act cannot be
  laundered later. He asks the senior Franciscan to
  unknot the cord from his waist and use it to bind
  his hands at his own instruction. The friar does.
  Bernardo kneels at the stone block. He looks once
  at Malintzin (she does not look away). He looks
  once at Andrés (Andrés is already climbing down
  from *San Esteban*'s cockpit). He bows his head.
  Andrés crosses the plaza on foot, draws a Toledo
  short-sword (his own, blessed in Havana in Ch 1),
  and kills him with a single transverse stroke at
  the base of the skull — quick, by the hand of the
  one person in the plaza who fully understands what
  it is. The body is laid on the linen. The senior
  adorator works fast: the relevant bones are taken
  while still warm — the right humerus, the lower
  jaw, two cervical vertebrae — wrapped, fused into
  the open monstrance bracket of *San Esteban* with
  the bone-chisels and a brief sealing rite said
  rapid-fire in Latin. The bracket closes. *San
  Esteban del Río* comes alive at apex-equivalent
  output: her hum jumps a full octave; the air over
  the plaza concusses; the Great Engine's hum, across
  the plaza, answers. Andrés climbs back into the
  cockpit covered in his friend's blood. Establish:
  the *Flora* name closing the Ch 1 child-of-Córdoba
  thread; the Franciscan cord (Ch 4) used as the
  ritual binding it was always going to become; the
  killing as Andrés's hand, by Andrés's blade,
  because that was the condition; the apex-equivalent
  fusion as the structural payoff of Ch 20's
  metaphysics; the answering hum from the Great
  Engine as the cue that the duel is on.
