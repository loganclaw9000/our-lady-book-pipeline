# Ch 26 sc03 — The hour-long duel; both engines fall; the city is taken.
chapter: 26
scene_index: 3
beat_function: |
  Continuing from sc02. The duel proper. *San Esteban
  del Río*, fueled by Bernardo's fresh willing-knower
  bones at apex-equivalent output, walks across the
  Templo Mayor plaza toward the Great Engine of the
  Templo Mayor. The Great Engine, half-awake on the
  last of the old Flower War relic reserves, rises
  from her cradle to meet her. For the first time in
  the book a Spanish Reliquary stands at apex height
  against a Mexica god-engine and the encounter is
  not a slaughter. Show the duel as a sustained
  set-piece, not a montage: the Great Engine's
  Quetzalcoatl-caste reach (she is taller, slower,
  built for the long arc), *San Esteban*'s
  apex-amplified Reconquista geometry (she is faster
  than her frame should allow, the new fuel making
  her exceed her own structural tolerance — she will
  not survive this even if she wins), the way the
  pyramid's lower platforms shake apart under their
  combined feet, the two hums beating against each
  other across the plaza in a pattern the witnesses
  cover their ears against. Andrés in the cockpit
  works the engine the way he was trained to —
  reflexes, breath control, the small Latin litany
  the adorators chant up at him through the speaking
  tube — and feels Bernardo *in* the engine, not as
  presence but as a willingness shaping every
  response. The hour is the hour Bernardo named:
  near the end of it *San Esteban*'s monstrance
  bracket begins to crack from the heat of the
  fresh-fused bone, and the Great Engine's hum
  drops three semitones in a row as the last Flower
  War reserves burn through. They fall within
  minutes of each other. *San Esteban del Río*
  collapses forward onto her own knees, monstrance
  split, hum gone to silence. The Great Engine of
  the Templo Mayor topples backward into her own
  cradle, the cradle gives, the lower platforms of
  the pyramid shake apart under the impact. The
  city's heartbeat — present since Ch 1, half-silent
  since Ch 21 — goes out. Cuauhtémoc, watching from
  the canal at the rear of the temple precinct,
  flees by canoe and is captured by a Spanish
  brigantine within the hour. The city is taken.
  Andrés climbs out of *San Esteban*'s cockpit. He
  stands on her broken shoulder in the smoke. He
  does not weep. He cannot. He has used up whatever
  inside him could. Establish: the Ch 1 hum closing
  on its silence; one informed willing death equaling
  a century of accumulated fuel, demonstrated;
  Cuauhtémoc's capture as the historical pin for the
  fall; Andrés's depleted state as the ground from
  which Ch 27 will close.
