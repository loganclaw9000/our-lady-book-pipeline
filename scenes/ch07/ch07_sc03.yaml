# Ch 7 sc03 — The night before Cholula. Malintzin cannot sleep.
chapter: 7
scene_index: 3
beat_function: |
  Night before the entry into Cholula. The camp is quiet in the
  way armies are quiet before a thing happens. Malintzin lies
  awake on her mat in the women's tent. She has not told Andrés
  about the warning. She has not told any of the Spanish women.
  She thinks about: the old woman; her own seventeen-year-old face
  in the river that morning two months ago; what *intelligence
  asset* will turn out to mean. She is beginning to understand,
  without language for it, that information is survival, that
  being the chain between two languages will, eventually, become
  being the chain between two civilizations. Outside the tent the
  Reliquaries' hums weave in and out of each other, twelve engines
  on overnight standby, plus the Tlaxcalan teōmecahuītlī across
  the camp. She has never heard so many engines hum at once. She
  cannot sleep. Establish: the moral interior cracking open,
  no event yet, all preparation.
pov: "Malintzin"
