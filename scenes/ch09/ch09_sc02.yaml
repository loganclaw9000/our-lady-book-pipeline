# Ch 9 sc02 — Moctezuma + Cortés meet. Malintzin translates.
chapter: 9
scene_index: 2
beat_function: |
  STRICT POV: ITZCOATL ONLY. He does NOT enter Andrés's, Cortés's,
  or Malintzin's interior. He observes them all through Mexica
  honor-guard distance.

  The first meeting between Moctezuma and Cortés on the causeway.
  Malintzin translates through Aguilar — the chain. Itzcoatl is
  honor-guard, *Obsidian Mirror* directly behind Moctezuma's litter.
  He hears the translation in Nahuatl, hears Cortés's Spanish in
  fragments through Aguilar, watches Malintzin's face through the
  open canopy. He recognizes (without yet meeting her) the strange
  Nahua girl his sister Xochitl is teaching court protocol — same
  girl. He files this. The exchange is formal, polite, Mexica-
  diplomatic on Moctezuma's side and lawyerly-ceremonial on Cortés's.
  No one mentions Cholula. Show: Itzcoatl noticing Moctezuma's
  fatigue, the Reliquaries' hums interleaving uneasily with the
  Mexica engines' god-frequencies in a soundscape neither pilot
  tradition has heard before.
