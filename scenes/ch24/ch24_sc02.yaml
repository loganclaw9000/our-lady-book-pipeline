# Ch 24 sc02 — Bernardo and Malintzin teaching each other; the horizon line.
chapter: 24
scene_index: 2
beat_function: |
  Several evenings in June 1521, condensed into one
  represented evening (the scene establishes that this is
  habit). Bernardo and Malintzin sit together outside her
  annex of the command tent, a single oil lamp between
  them, parchments and a copy of a Latin breviary on a
  small folding table. She is teaching him Nahuatl; he is
  teaching her ecclesiastical Latin. They have done this
  for months now; Ch 11 was the start of it (wonder and
  curiosity), Ch 20 was the unguarded confession that
  ruined the activity for both of them, this is the
  activity continuing afterward in full knowledge. Both
  of them now know what the engines run on. Both of them
  know what the siege will cost. Show the texture: the
  way Malintzin corrects his mouth on the lateral *tl*
  cluster in *cuauhtli*, the way he corrects her on the
  ablative of *vita*, the small pleasures of grammar
  shared between two people who have decided to keep
  doing this. Then, mid-conversation, Bernardo begins
  saying things he is not aware he is saying — he is
  thinking about the Castilian arm-bone in *San Esteban
  del Río* and about the Franciscan cord at his belt,
  and he begins talking about what a priest might owe
  to a city he cannot save, what the consent of a martyr
  actually structurally permits, what it would mean for
  a Reliquary's monstrance to be charged not by a
  centuries-old relic but by a freshly informed willing
  death. He says these things in Latin, partly because
  Latin is the language of the theology he is unpacking
  and partly because saying them in Spanish would be
  unbearable. Malintzin hears every word. She does not
  ask him to stop. She corrects his Nahuatl on a
  separate clause and lets the Latin run. Establish: the
  Ch 11 mirror-scene closing now in its grief register;
  Bernardo's choice forming aloud in front of her in a
  language she now understands well enough to audit;
  Malintzin as the only witness to the construction of
  the martyrdom in Ch 26.
