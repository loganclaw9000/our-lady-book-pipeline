# Ch 24 sc03 — Their last full session; she chooses not to dissuade him.
chapter: 24
scene_index: 3
beat_function: |
  Late June 1521. The convergence point. Bernardo and
  Malintzin sit for what will turn out to be their last
  full Nahuatl/Latin session before the events of Ch 25-26.
  Neither of them announces this; both sense it. The
  setting is the same — the lamp, the table, the breviary
  — but the lesson plan she has prepared tonight is
  pointedly practical: the Nahuatl liturgical vocabulary
  Bernardo will need if he is going to administer last
  rites to indigenous Christians during and after the
  fall of the city. He understands what she is doing. He
  thanks her in Nahuatl, accurately, and continues the
  lesson. She, in turn, asks him to walk her through the
  Latin form of the *commendatio animae* — the prayer
  for a soul leaving the body — including the variant
  forms a confessor uses for a martyr versus a layperson.
  He does, slowly, in full. She writes nothing down; she
  is learning by ear because she does not want this on
  parchment in any tent in the camp. At the end of the
  session he reaches across the table and rests his hand
  briefly on her wrist — the only physical touch they
  have ever exchanged in the book — and says, in
  Nahuatl, *thank you for not asking me to stop*. She
  says, in Latin, *I am not in the business of stopping
  anyone tonight*. He smiles. He gathers his breviary.
  He walks back toward the Franciscan tent. She sits
  with the lamp until it burns out. Establish: the
  convergence — all storylines drawing together; the
  *commendatio animae* as the prayer Andrés will say
  over Bernardo in Ch 26; Malintzin's deliberate refusal
  to dissuade him as the *power within* of Ch 22
  enacted in its hardest specific case; the touch on
  the wrist as the only intimacy in their thread,
  earned because they have stopped pretending to each
  other.
