# Ch 27 sc01 — Smoke for days; Malintzin walks the ruins; the nod.
chapter: 27
scene_index: 1
beat_function: |
  STRICT POV: MALINTZIN ONLY. Previous chapter was ANDRÉS POV;
  do NOT slip into ANDRÉS's interior or recycle their lore. The
  other characters appear from the outside, through MALINTZIN's eyes.

  Several days after August 13, 1521. The ruins of
  Tenochtitlan. Smoke still rising from the southern
  wards (it will rise for a week). Indigenous laborers
  — newly called *Indians* in Spanish official
  language, a category that did not exist a year ago —
  hauling shaped stone from the broken platforms of
  the Templo Mayor toward a foundation being trenched
  on the same ground for what the Franciscans are
  calling, in chalked Latin on a board near the
  trench, *cathedralis*. Malintzin walks slowly
  through the ruins: visibly pregnant (eighth month
  now), in a Nahua undertunic with a Spanish woolen
  cloak over it, alone but unmolested — every
  Tlaxcalan and Texcocan warrior she passes makes
  way for her without comment. Show what she sees:
  a market stall standing intact among collapsed
  walls; a Mexica child of perhaps four sitting on a
  stone with no adult visible, eating a piece of
  amaranth bread a Tlaxcalan soldier has handed her;
  a Spanish farrier already setting up shop in the
  doorway of what was a goldsmith's house. She
  passes Itzcoatl. He is on foot, *Obsidian Mirror*
  in cradle a half-mile away, walking back from
  inspecting what is left of the Mexica engine
  cradles. Their paths cross at a corner that used
  to be the entrance to a Tezcatlipoca shrine. They
  do not speak. They nod. Both of them understand
  what the nod means — Xochitl's name is in it,
  their mothers' names are in it, the causeway in
  Ch 19 is in it, the silent compact since then is
  in it; neither of them would translate any of
  this for the other, even though she could. They
  pass. Establish: the Ch 3 mirror beginning to
  close (her first translation in Ch 3 echoed by
  her chosen silence here); the Itzcoatl-Malintzin
  thread closed in a single gesture, exactly the
  weight Ch 21 sc02 made bearable; the city as the
  inverse of the city of Ch 1, the *new normal*
  named in passing.
