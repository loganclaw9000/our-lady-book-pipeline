# Ch 27 sc02 — Andrés buries Bernardo; the monstrance-stone goes to the cathedral.
chapter: 27
scene_index: 2
beat_function: |
  Late August 1521 condensed across several days. Two
  paired actions, both seen by Malintzin (the chapter's
  POV) at distance or by report rather than directly.
  First: Andrés rides out to a Tlaxcalan chapel in the
  hills above the lake, carrying what could be
  recovered of Bernardo's ossuary after *San Esteban
  del Río*'s monstrance was opened — the remaining
  bones not consumed by the apex fusion, perhaps a
  third of the skeleton, wrapped in the blood-stiff
  linen from the plaza. He buries them himself with a
  Tlaxcalan stonemason's help, in a niche cut into the
  chapel wall. He does not commission a marker. The
  brief flash-forward narration permitted by
  Malintzin's POV registers what she will later learn
  about him: he will live another forty years; he will
  never pilot again; he will refuse every sacrament but
  baptism and last rites. Second: in the city, a
  Spanish artisan with two indigenous apprentices
  works in the Templo Mayor plaza at the wreck of
  *San Esteban del Río* — pries the monstrance-stone
  free from her broken sternum bracket with a chisel
  and a wooden mallet, wraps it in cloth, loads it on
  a barrow, and walks it toward the cathedral
  foundation a quarter-mile away where the
  Franciscans are blessing the stones for the altar.
  Show this from Malintzin's vantage at a window of
  the temporary dwelling Cortés has assigned her: the
  barrow crossing the plaza, the wrapped stone on it,
  the artisan whistling. The engine has been taken
  apart to feed the church. The church is being built
  on the engine of the city it burned. The cycle does
  not end. It is only renamed. Establish: the
  bones-into-engines / bones-into-cathedrals image
  pair (Ch 1 mirror) closing in literal physical
  carriage of one stone across the plaza; Andrés's
  forty-year coda as a refusal-to-pilot that
  preserves the ambiguity of his survival; the
  refusal of redemption at the structural level.
