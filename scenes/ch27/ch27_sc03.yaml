# Ch 27 sc03 — Late 1521; Malintzin's last line in Nahuatl, untranslated.
chapter: 27
scene_index: 3
beat_function: |
  Late 1521, several months after the fall. A small
  walled garden at the back of the Spanish-occupied
  house Cortés has assigned Malintzin in the partly
  cleared Tenochtitlan precinct. She has given birth
  (the child is a few weeks old, in a wrap against
  her body). Late afternoon. The Templo Mayor district
  is quieter now; the cathedral foundation work is
  audible faintly across the rooftops as a steady
  chinking of mallet on stone. Andrés is in the
  garden as well, twenty feet away, sitting on a low
  bench with his back to a wall, doing nothing in
  particular — he has been spending afternoons here
  the way a man spends afternoons in a place where he
  does not have to perform; she has not asked him to
  leave; he has not asked permission. He has not
  piloted since the duel. Show: the texture of the
  garden — a fig tree the previous Mexica owner
  planted, two raised beds gone to weed, the small
  brick brazier where she boils water for the child,
  the Nahua woman who attends her sitting at the
  inside doorway with her own work. Malintzin sits
  on a stone in the late sun and speaks to the
  child in a low voice. The sentence she says is in
  Nahuatl, in the formal register her mother used to
  her — a sentence that names what she has done and
  what she hopes the child will do with it. The
  sentence is not translated on the page. Andrés,
  twenty feet away, now understands her Nahuatl well
  enough to translate every word — Bernardo's
  lessons in Ch 11 and Ch 24 finished what the
  causeway and the camp began. He chooses not to
  translate it, even in his own head past the
  surface meaning. He hears the sentence as her
  privacy. He looks at his hands. The book ends on
  the Nahuatl words, written out in their script
  with no gloss. Establish: the Ch 3 first
  translation closing on her chosen silence (the
  thematic restraint the outline names); Andrés's
  comprehension as the proof of a thread the book
  has run all along, and his refusal to translate
  as the only intimacy he can still offer; the
  cycle renamed but not broken; the ending built
  from the bones of the beginning in every literal
  sense the book has established.
