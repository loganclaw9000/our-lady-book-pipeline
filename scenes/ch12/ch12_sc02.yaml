# Ch 12 sc02 — Ixtlilxochitl's proposition.
chapter: 12
scene_index: 2
beat_function: |
  Itzcoatl meets his cousin Ixtlilxochitl, twenty-eight, eldest
  surviving son of the late philosopher-king Nezahualpilli, passed
  over for the Texcocan throne in favor of his half-brother Cacama
  (a Mexica-aligned successor). Ixtlilxochitl has been in
  semi-exile in northern Texcocan territories for three years. He
  is already in secret correspondence with Cortés. He greets
  Itzcoatl with open hands and a proposition: Texcoco can become
  something again, but only if it chooses before the Mexica make
  the choice for it. Itzcoatl refuses. Ixtlilxochitl does not
  press. He says, *you will come when you come.* Itzcoatl notes,
  with unease, that his cousin is right. Establish the mirror-
  cousin relationship that will close in Ch 23.
pov: "Itzcoatl"
date_iso: "1519-12-22"
location: "Northern Texcocan territory, Ixtlilxochitl's camp"
