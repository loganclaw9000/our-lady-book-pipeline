# Ch 12 sc03 — Itzcoatl back in Tenochtitlan, checks on Xochitl.
chapter: 12
scene_index: 3
beat_function: |
  Itzcoatl returns to Tenochtitlan in early January. He goes to
  see his sister Xochitl Tlapala at her husband's house. She is
  well. She is teaching a strange Nahua girl Mexica court protocol
  in the palace gardens — the girl Cortés brought up from the
  coast. Itzcoatl does not meet the girl. He files the detail.
  His sister's children are well. Xochitl asks after their mother.
  Itzcoatl tells her about the seals; Xochitl listens without
  visible alarm. He returns to *Obsidian Mirror*'s cradle that
  evening. He sits in the cockpit, hum running low, and thinks
  about Ixtlilxochitl's proposition. He has refused it. He knows
  he will refuse it again. He does not know if he will refuse it
  forever. Establish: the family thread tying him to Malintzin
  through Xochitl, the seeds of his own defection in Ch 23.
pov: "Itzcoatl"
