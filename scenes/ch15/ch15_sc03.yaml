# Ch 15 sc03 — Bernardo in the palace. The siege begins.
chapter: 15
scene_index: 3
beat_function: |
  Same day. Itzcoatl reaches *Obsidian Mirror*'s cradle, performs
  the abbreviated waking-rite (the full rite is a forty-minute
  ceremony; the emergency form takes seven), and walks Mirror
  out into a city that has erupted. Citizens are already attacking
  the Spanish position at Axayacatl's palace; the streets between
  the engine compound and the palace are choked with people, with
  bodies, with the first improvised barricades. Itzcoatl joins the
  besieging force from outside, holding Mirror back from direct
  engine-engagement (the four Spanish Reliquaries inside the
  palace courtyard would mean a city fight he is not authorized
  to start without orders from a tlatoani who is presently a
  hostage). Cut, briefly, to inside the palace — not Itzcoatl's
  POV, but reported, glimpsed, conveyed by what Itzcoatl can see
  from outside through the opened gate before it slams: Fray
  Bernardo, the Dominican, was inside Axayacatl's palace when the
  killing began outside. He went to Alvarado in the courtyard and
  ordered him to stop. Alvarado's hand went to his sword and he
  said he would have Bernardo killed where he stood; Bernardo did
  not move; an officer pulled Alvarado away. Bernardo has retreated
  to the small interior chamber the Spanish have made of a chapel
  and is praying aloud, in Nahuatl, naming the dead by name —
  starting with the four ixiptla he had met during his Nahuatl
  lessons with Malintzin (he had asked Malintzin to introduce him
  to the boys; she had; they had spoken). Most of the Spanish
  inside the palace dismiss him. Andrés is not in the city — he
  is at Cempoala — but the other pilots in the garrison hear him.
  Outside, Itzcoatl in Mirror's cockpit feels the wrong pitch of
  the Great Engine through Mirror's own resonance frame, and
  Mirror is unsteady on its feet for the first time he has ever
  walked it. Establish: the siege of the Spanish palace begins;
  Bernardo's first open break with the expedition's conduct
  (martyrdom arc seeded); Xochitl is at home with the children
  (Itzcoatl does not yet know her husband is dead; he will know
  by the next morning, off-page, before Ch 16); the Spanish
  garrison effectively cut off, the city erupted, no going back.
