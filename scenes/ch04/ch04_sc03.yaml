# Ch 4 sc03 — Totonac alliance at Cempoala.
chapter: 4
scene_index: 3
beat_function: |
  Cempoala. The Totonac alliance is offered. The fat cacique,
  chafing under Mexica tribute, offers warriors. Andrés meets the
  first Totonac engine pilots: smaller machines, tropical motifs
  (feathered headdresses, jade insets), their pilots anxious in
  ways the Spanish pilots are not. Show Andrés through Totonac
  eyes briefly — he is taller than the cacique expected, and his
  Reliquary's hum is a register the Totonac engines cannot match
  on the welcome ceremony. Bernardo translates the welcome
  through a Totonac interpreter. La Niña kneels for the welcome,
  in the Spanish pilot tradition; the Totonac engines do not
  kneel — their tradition has them stand and lift their weapon
  arm in salute. Two engine traditions meet without yet knowing
  how to read each other.
pov: "Andrés de Mora"
date_iso: "1519-07-15"
location: "Cempoala plaza, Totonac capital"
