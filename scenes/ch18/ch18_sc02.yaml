# Ch 18 sc02 — Matlalcueitl runs. Sun-at-Noon dies.
chapter: 18
scene_index: 2
beat_function: |
  Midday. The engagement has gone, briefly, the way it should:
  *Sun-at-Noon* is breaking the Spanish formation, the Tlaxcalans
  are giving ground, the Spanish cavalry that survived the
  causeway have been unhorsed and are fighting on foot. Then
  Cortés (or, in some chronicles, a captain named Salamanca, or
  in others a Tlaxcalan officer — the book may keep this attribution
  uncertain in keeping with the sources) sees the Mexica
  standard-bearer near *Sun-at-Noon*'s feet and orders a charge to
  capture or kill him. The Mexica standard is taken. A Tlaxcalan
  teōmachtiani named Matlalcueitl — a woman in her thirties,
  scarred, a ranking pilot of one of the destroyed Tlaxcalan
  teōmecahuītlī, on foot now because her engine is broken in
  Tenochtitlan, her head wrapped in a stained cloth from a wound
  taken on the causeway — picks up the captured Mexica standard
  and runs across the plain toward *Sun-at-Noon*. She runs under
  *Sun-at-Noon*'s blows. The hundred-foot engine swings and
  misses; she is too small and too close to the engine's own
  shadow to track. She reaches the heart-chamber access — the
  ritual seam, low on the engine's chest, where the bone-fuel
  pipeline meets the seal — and she drives the standard pole
  through the seam with both hands. *Sun-at-Noon* dies. The
  hum cuts. The engine does not fall — it sets down, slowly, on
  one knee, and stays there, eyes-open and unmoving, the way a
  god-engine dies when its seal has been breached without its
  sanctuary nearby. Itzcoatl sees this through the mirror-stack
  viewer from Mirror's flanking position. He sees Matlalcueitl
  step back from the dead engine, the pole still in its chest,
  her hands empty, her cloth-wrapped head not even raised in
  triumph. The Mexica line breaks. The Spanish, who should have
  lost, will win this battle by the end of the afternoon. Inside
  Mirror's cockpit, in the dark of the mirror-stack, Itzcoatl
  considers, for the first time, that his side might lose this
  whole war. The consideration arrives whole. He does not push
  it away. He examines it. The examination itself is a betrayal
  of the loyalty he has carried since boyhood — he knows it as
  he is doing it. Mirror's hum stays steady against his back; the
  engine itself does not register the betrayal. He keeps walking
  Mirror on the flank. Establish: Matlalcueitl as a real,
  named, physical person (she will recur in passing in Acts 3 —
  her presence in the alliance counted by Itzcoatl when he later
  weighs sides); the moment of *Sun-at-Noon*'s death, mechanically
  precise; the betrayal-by-thought as Itzcoatl's first crack —
  this is the seed that will fully open in Ch 19 when he walks
  into Tlaxcala in civilian clothes.
