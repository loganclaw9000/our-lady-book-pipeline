# Ch 18 sc03 — Aftermath. Survival reframed.
chapter: 18
scene_index: 3
beat_function: |
  Late afternoon, Otumba. The Mexica have withdrawn from the
  plain in the unstructured way an army withdraws when its
  showpiece engine has been killed by a foot soldier and the
  morale-line has snapped. Itzcoatl walks Mirror back toward the
  Mexica camp, then orders Mirror's adorator-priests to put her
  into rest-rite in the field rather than at the home cradle —
  he wants her shut down before he goes back among his own. He
  performs the closing rite with them, helmet off, face wet (rain
  again, lighter than the causeway's, or sweat, or both). After
  the rite he walks alone to the edge of the camp and looks
  west, where Cortés's column is making for Tlaxcala. He thinks
  about: his cousin Ixtlilxochitl, whose proposition in December he
  refused; his sister Xochitl, widowed in May, son scarred; his
  mother in Texcoco who at dinner months ago told him the seals
  at Cholula and Tula had cracked further. He thinks about
  Matlalcueitl on the plain, hands empty, head down. He thinks
  about *Sun-at-Noon* sitting on its knee with the standard pole
  through its heart-chamber. He does not pray. He does the
  Texcocan philosopher's exercise his mother taught him as a
  boy — name the thing you do not want to name — and the thing he
  names is: I am beginning to choose. What he calls dedication
  has, in the past hour, become something his teachers would not
  recognize as dedication. The night closes. He sleeps in
  Mirror's cradle in the field. Establish: dedication-through-trial
  reframed as the first half-step of defection (the structural
  beat the chapter is named for, but inverted from the
  expectation of the reader who hasn't traced Itzcoatl's arc
  carefully); the explicit naming of the thought (so its return
  in Ch 19, when he walks into Tlaxcala, is not a surprise but
  the closing of a loop the reader saw open here); Mirror at rest
  in a field, away from the Templo Mayor's wounded hum, for the
  first time in this campaign — a small physical fact that
  matters.
pov: "Itzcoatl"
date_iso: "1520-07-07"
location: "Plains of Otumba, Mexica camp at the field's edge, late afternoon into night"
