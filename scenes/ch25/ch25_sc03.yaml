# Ch 25 sc03 — Bernardo and Andrés in the lamplit tent; the offer named.
chapter: 25
scene_index: 3
beat_function: |
  The night of August 12, 1521. Andrés's tent in the
  forward camp; *San Esteban del Río* in cradle just
  outside, hum low. Bernardo arrives alone — no
  retinue, no Franciscan brother, the cord at his
  waist and his breviary under one arm. He has eaten;
  he has confessed; he has spent two hours in prayer
  in the Franciscan tent first. He sits on the
  camp-stool across from Andrés and they share a cup
  of watered wine in silence for several minutes
  before either speaks. Then Bernardo says, plainly:
  *I know what you have to do. I know what I have to
  do.* He does not soften it. He does not theologize.
  He explains the mechanics in the language of an
  engineer because that is the language Andrés can
  hear it in: the apex equivalent the engine corps
  cannot otherwise reach; the structural difference
  between a centuries-old relic in a monstrance and
  the bone of a willing knower fused fresh; the one-
  hour window such a fusion would yield against a
  half-awake Quetzalcoatl. He says he has thought
  about this for weeks. He says he has spoken of it
  to no one but God and (he names her) Doña Marina.
  He asks Andrés, formally, to be the one to perform
  the killing — quickly, by a weapon Andrés
  understands, in public so the act cannot be denied
  later — because it must be done by someone who
  understands what it is and it must be quick.
  Andrés does not agree in this scene. He does not
  refuse. He says: *let me sit with this until
  morning.* Bernardo nods. He stands. He rests his
  hand briefly on the Franciscan cord at his waist —
  the same third-class relic he has carried since Ch
  4 — and walks out into the dark. Establish: the
  offer placed in language that cannot be misheard;
  the Franciscan-cord gesture as the seed of its
  ritual use in Ch 26; Andrés's deferral as the
  small mercy he gives himself on the last night
  before the choice; Malintzin's name spoken aloud
  by Bernardo as the only other human who knows.
