# Ch 25 sc02 — The Great Engine half-awake; the hum across the city.
chapter: 25
scene_index: 2
beat_function: |
  August 11, 1521. Forward Spanish position three blocks
  short of the Templo Mayor plaza. *San Esteban del Río*
  in cradle for an hour while the adorators rebless her
  monstrance bracket. Andrés is on foot in the rubble
  with a Tlaxcalan captain and a runner from Cortés's
  command. The Great Engine of the Templo Mayor — the
  apex Mexica god-engine, Quetzalcoatl-caste, the
  city's heartbeat in Ch 1 — has been half-awake for
  three days. Show the hum: a sub-bass that is felt
  before it is heard, present in the chest cavity,
  audible to *San Esteban*'s adorators as a faint
  pitching of their own engine's tone. The Great
  Engine is fueled by the last reserves of the old
  Flower War relics held in the Templo Mayor's deep
  vaults, but the *living* fuel chain — the willing
  knower, the consenting *ixiptla*, the priestly rite
  Itzcoatl walked past the cradles of in Ch 21 sc03
  — is broken. So she cannot wake fully. She can
  only sustain a half-state: enough hum to stop any
  single Reliquary the Spanish can field, not enough
  to walk and fight. She is sitting in her cradle in
  the plaza, immense, dark-eyed, the carved Quetzalcoatl
  basalt of her flanks vibrating slightly. Andrés
  looks across the rubble at her shape on the
  skyline. He understands, here, that no engine the
  Spanish have can answer her even at half-state. He
  does not yet know what is going to answer her.
  Establish: the Ch 8 mirror — apex engine half-waking
  on the other side of the conquest — closing with
  the same restraint; the felt presence of the Great
  Engine as the obstacle that will define Ch 26; the
  reader's awareness that no normal Reliquary can
  cross this gap.
