# Ch 11 sc02 — Xochitl Tlapala. Friendship + pregnancy.
chapter: 11
scene_index: 2
beat_function: |
  Introduce Xochitl Tlapala, twenty-six, Texcocan-born noblewoman,
  married into a Mexica jaguar-warrior house of Tlatelolco
  aristocracy, assigned to teach Malintzin court protocol. The
  garden at the back of the palace. Xochitl is witty, kind,
  politically intelligent. She has two children, eight and five.
  She talks about them without restraint. Malintzin, pregnant
  three weeks now and alone in her head about it, listens.
  Show: real friendship across a class line; Xochitl noticing
  what Malintzin is not saying about her body without naming it
  aloud; Mexica court-protocol rules folded into the conversation
  organically. Establish their friendship as the relationship
  whose loss in Ch 21 will break Malintzin in a way her translation
  work will not.
