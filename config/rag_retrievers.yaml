# rag_retrievers.yaml — 5 typed RAG retrievers + shared embeddings + bundler.
#
# The 5 retriever names (exact, never renamed):
#   historical, metaphysics, entity_state, arc_position, negative_constraint
#
# Per RAG-03 the bundler caps the ContextPack at 40KB to keep drafter prompts
# within the voice model's effective working-context. Conflicts between
# retrievers (e.g., historical bible vs entity-state card disagree on a date)
# are emitted to drafts/retrieval_conflicts/ for manual review.
embeddings:
  model: "BAAI/bge-m3"
  model_revision: "TBD-phase2"
  dim: 1024
  device: "cuda:0"
reranker:
  # Plan 02-06: hoist the BgeReranker defaults into config. Before this plan
  # the values were hardcoded in src/book_pipeline/rag/reranker.py. The
  # model_revision is resolved lazily per W-4 policy — this value is only a
  # placeholder; the actual resolved SHA lives in
  # indexes/resolved_model_revision.json (never written back to this file).
  model: "BAAI/bge-reranker-v2-m3"
  model_revision: "TBD-phase2"
  device: "cuda:0"
  candidate_k: 50
  final_k: 8
bundler:
  max_bytes: 40960
  assembly_strategy: "round_robin"
  enforce_cap: true
  emit_conflicts_to: "drafts/retrieval_conflicts/"
  # Plan 07-02 (PHYSICS-04 / D-22): per-axis byte cap for the 6th retriever
  # (continuity_bible / CB-01). 8KB keeps canonical-quantity hits from
  # crowding the 40KB total bundler budget while leaving room for the
  # canonical-stamp values to inject at the top of the drafter prompt (D-23).
  per_axis_byte_caps:
    continuity_bible: 8192
retrievers:
  historical:
    index_path: "indexes/historical/"
    source_files:
      - "~/Source/our-lady-of-champion/brief.md"
    chunk_strategy: "paragraph"
  metaphysics:
    index_path: "indexes/metaphysics/"
    source_files:
      - "~/Source/our-lady-of-champion/engineering.md"
    chunk_strategy: "rule_card"
  entity_state:
    index_path: "indexes/entity_state/"
    source_files:
      - "~/Source/our-lady-of-champion/pantheon.md"
      - "~/Source/our-lady-of-champion/secondary-characters.md"
    chunk_strategy: "named_entity"
    auto_update_from: "entity-state/"
  arc_position:
    index_path: "indexes/arc_position/"
    source_files:
      - "~/Source/our-lady-of-champion/outline.md"
    chunk_strategy: "beat_function"
  negative_constraint:
    index_path: "indexes/negative_constraint/"
    source_files:
      - "~/Source/our-lady-of-champion/known-liberties.md"
    chunk_strategy: "topic_tag"
  # Plan 07-02 (PHYSICS-04 / D-22): 6th retriever lane. Source is
  # config/canonical_quantities_seed.yaml (operator-truth hand-seed per OQ-05
  # (c) RESOLVED 2026-04-25) — NOT a corpus markdown file. The chunk_strategy
  # is "structured_yaml" because each YAML entry maps 1:1 to a LanceDB row;
  # no markdown chunking is performed. CorpusIngester does NOT read from this
  # entry — the dedicated ingest_canonical_quantities() function in
  # book_pipeline.corpus_ingest.canonical_quantities owns the write path.
  continuity_bible:
    index_path: "indexes/continuity_bible/"
    source_files:
      - "config/canonical_quantities_seed.yaml"
    chunk_strategy: "structured_yaml"
