# mode_thresholds.yaml — Mode A (voice-FT local) / Mode B (frontier) dial
# per ADR-001, plus oscillation + alert tuning + voice-fidelity (OBS-03).
#
# voice_fidelity.anchor_set_sha is rewritten by `book-pipeline curate-anchors`
# whenever the anchor set changes (Plan 03-02). Thresholds are the Plan 03-02
# defaults (pass 0.78 / flag-band 0.75-0.78 / fail 0.75 / memorization flag
# 0.95 per PITFALLS V-1 + V-2). The CLI's atomic rewrite does NOT preserve
# this header — if you re-run curate-anchors and want the header back, you
# have to re-add it manually OR restore from git.
mode_a:
  regen_budget_R: 3
  per_scene_cost_cap_usd: 0.0
  voice_fidelity_band:
    min: 0.6
    max: 0.88
mode_b:
  model_id: claude-opus-4-7
  per_scene_cost_cap_usd: 2.0
  regen_attempts: 1
  prompt_cache_ttl: 1h
oscillation:
  enabled: true
  max_axis_flips: 2
alerts:
  telegram_cool_down_seconds: 3600
  dedup_window_seconds: 3600
preflag_beats: []
voice_fidelity:
  anchor_set_sha: 28fd890bc4c8afc1d0e8cc33b444bc0978002b96fbd7516ca50460773e97df31
  pass_threshold: 0.78
  flag_band_min: 0.75
  flag_band_max: 0.78
  fail_threshold: 0.75
  memorization_flag_threshold: 0.95
# Plan 03-04: DRAFT-02 per-scene-type sampling profiles. Keys must match
# VALID_SCENE_TYPES in drafter.sampling_profiles. Heuristic fallback: if
# scene_type is absent from the request AND prior_scenes contain >=3 paired
# quote marks, the drafter resolves scene_type='dialogue_heavy'; otherwise
# defaults to 'prose'.
sampling_profiles:
  prose:
    temperature: 0.85
    top_p: 0.92
    repetition_penalty: 1.05
    max_tokens: 2048
  dialogue_heavy:
    temperature: 0.7
    top_p: 0.90
    repetition_penalty: 1.05
    max_tokens: 2048
  structural_complex:
    temperature: 0.6
    top_p: 0.88
    repetition_penalty: 1.05
    max_tokens: 2048
# Phase 3 gap-closure (2026-04-21): backend-swappable critic. Default backend
# is `claude_code_cli` — shells out to `claude -p --json-schema ...` using
# OAuth credentials from ~/.claude/ (subscription-covered, no API key).
# Switch to `anthropic_sdk` (requires ANTHROPIC_API_KEY env var) if you need
# the SDK path specifically (e.g. for non-interactive CI without a logged-in
# claude CLI).
critic_backend:
  kind: claude_code_cli
  model: claude-opus-4-7
  timeout_s: 180
  max_budget_usd_per_scene: 1.0
# Plan 05-02 D-05 + D-06: regen budget + per-scene USD spend cap.
# r_cap_mode_a = number of Mode-A regen attempts allowed before escalating to
# Mode-B (total = 1 initial + r_cap_mode_a). spend_cap_usd_per_scene is a hard
# abort on cumulative scene spend (drafter + critic + regen + mode_b events
# summed via book_pipeline.observability.pricing.event_cost_usd).
regen:
  r_cap_mode_a: 3
  spend_cap_usd_per_scene: 0.75
# Phase 7 Plan 04 (PHYSICS-09): repetition_loop treatment-conditional thresholds.
# Pitfall 10: LITURGICAL treatment (chant, prayer, ritual) raises threshold;
# default treatment uses tighter thresholds. Identical-line counts are the
# MAX allowed — >=count+1 distinct identical lines = FAIL.
physics_repetition:
  default:
    trigram_repetition_rate_max: 0.15
    identical_line_count_max: 2  # >=3 identical lines fails
  liturgical_treatment:
    trigram_repetition_rate_max: 0.40
    identical_line_count_max: 5  # >=6 identical lines fails
# Phase 7 Plan 05 (PHYSICS-10 / D-28): scene-buffer dedup threshold.
# BGE-M3 cosine similarity vs prior committed scenes' embeddings; ≥ this
# threshold sets the scene_buffer_similarity axis to FAIL (deterministic
# override applied AFTER the Anthropic call returns). Tunable.
physics_dedup:
  scene_buffer_similarity_threshold: 0.80
