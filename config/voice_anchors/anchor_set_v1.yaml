- id: train_filtered_essay_002
  text: 'I have been thinking about what it actually feels like to trust something
    that isn''t alive.


    Not in a philosophical way. In a practical, sweaty-palmed, your-life-depends-on-this
    way. Because there''s this moment in the piece I''ve been working on: a woman
    on a tumbling warship, gravity pointing the wrong direction, 20 feet of wall between
    her and survival: where she has to decide, in about half a second, whether to
    trust a robot dog named Doc to be exactly where her foot needs it to be, 12 feet
    off the ground, with a 10% chance of success blinking in her HUD. And she kicks.
    She just kicks. And I''ve been sitting with that decision for three days now because
    I think it''s actually the most human thing I''ve ever written. Not the action.
    The surrender inside the action. The specific texture of letting go when letting
    go is the only move left.'
  sub_genre: essay
  source_file: /home/admin/paul-thinkpiece-pipeline/v3_data/train_filtered.jsonl
  source_line_range: 433-433
  provenance_sha: f3caaa7ddf26b7c2
- id: train_filtered_essay_003
  text: 'Concerning Workshop Hemeticism, Wallace is on the offensive: he speaks out
    against the boom in fiction programs and their “safe” environments that attempt
    to make fiction uniform, thus endangering creativity; as well as the idea that
    many teachers may rather be working on their own fiction than teaching. His stance
    here immediately made me think of a November 2014 New Yorker article entitled
    “Why I Am Teaching a Course Called ‘Wasting Time on the Internet’” by Kenneth
    Goldsmith, which describes a weekly three hour class of unstructured internet
    time to be used as inspiration for creative writing. It goes without saying that
    much of Alt Lit ignores common “good writing” conventions taught in workshop,
    as well as purposefully including spelling and formatting errors. In this case
    there is at least one exception to Wallace’s attacks on fiction workshops, but
    I’d be willing to bet that things have changed in the almost 30 year window since
    he initially published Fictional Futures.'
  sub_genre: essay
  source_file: /home/admin/paul-thinkpiece-pipeline/v3_data/train_filtered.jsonl
  source_line_range: 453-453
  provenance_sha: c8e889fcac156a56
- id: train_filtered_essay_004
  text: 'The 17 year Lovesong of the Periodical Cicada


    Do you feel this way? I think you do.


    After nearly two decades


    spent inch-ing among tree roots


    suckling at the sun’s gangly subterranean fingers, you are


    so bursting with the need and desire to procreate that your entire body can’t
    help but quiver and shake to its own rhythm.


    It must be generational; that I am so wrought quaking like this.


    Some epigenetic mistake that’s led to our depravity here;


    that my brothers and I gather and shout for sex,


    burst from our shells to convulse in mass orgies,


    undulate with scary new wings in scary new places:


    “Pharoh, Phar-oh, Pharrrrrrrr-Ohhhhhhhhh”


    Our fathers must have been more proper about it,


    engaged our mothers with more chivalry


    than to just shout at them over the din of a thousand others


    vying to be loudest in their 5 weeks of sexual maturity.


    Our mothers must have had more tact,


    than to buzz through choruses of suitors


    convinced to bed by the loudest and brashest


    of our fathers, puffed-up drunk on summer air.


    No,


    no brood before us has felt this.


    We are the first of our species to discover pure passion


    in the creases of each other’s exoskeletons.


    It is our birthright,


    after 17 years spent locked inside our bodies and homes,


    to fuck.


    Right?'
  sub_genre: essay
