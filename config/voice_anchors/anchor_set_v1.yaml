- id: train_filtered_analytic_010
  text: Speaking of waste, the rangers at Golden Gate Park in San Francisco were spending
    hours of their day informing dog owners that they weren’t allowed to have their
    dogs off leash in certain areas of the park. Rec and Park’s signage and information
    around where owners could have their dogs off leash was abysmal, and compounded
    by contradictory signs informing owners they had to leash their dogs in certain
    areas (implying everywhere else was offleash). When I first moved to the area,
    tensions were high. One ranger I spoke with, Carlo, said that their jobs were
    being threatened if they didn’t start actively ticketing dog owners. What’s more,
    many of the rangers were dog owners themselves who felt the rules and punishments
    were overly harsh. They were stuck between a rock and a hard place that was eating
    up an increasing amount of their time as they received more downward pressure
    from R&P Department management and more pushback from an increasingly agitated
    community of confused dog owners. Every person they steered in the direction of
    the designated areas was a drop in the ocean of uninformed owners who visited
    the park each day. I felt deeply for them, and didn’t want them to lose their
    jobs. I reached out to R&P department management to discuss the issue and received
    minimal communication. I was persistent in emailing and calling, and was eventually
    able to speak to a representative who admitted they didn’t have an information
    campaign, and that the lack of signage made things confusing. I launched a website,
    ggpodd.com, that included a survey asking owners if they were aware of the proper
    areas. In doing so I launched an informal education campaign to step in and do
    R&P’s job for them, while simultaneously collecting data on gaps in their information
    and signage policy and signatures on a petition to amend the rules. I printed
    out flyers with QR codes and recruited other concerned dog owners to the cause.
    Within the month the website had received over 5,000 hits, we’d directly educated
    400 dog owners on the official rules and off leash areas, and we’d collected over
    100 signatures to amend the off-leash rules. According to Carlo, conflict between
    rangers and owners dropped from an everyday occurrence to once-monthly, and their
    bosses were no longer threatening to fire them!
