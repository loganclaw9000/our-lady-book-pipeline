- id: train_filtered_essay_007
  text: Mark, I really love the pragmatic angle you’ve asked us to take in these reports,
    your predecessor was all sunshine and rainbows- but you get the idea of a life
    with gritty details. This punk thinks he does too, he’s wrong though. His “pragmatism”
    in the early twenties is a solid move, when you don’t know what play to make,
    make the play that leaves the most options open. It’s not real pragmatism, just
    macroprocrastination. He’s convinced that he’ll know the right thing when he sees
    it- be it a girl, a job, or a city. That’s all great, except the for the first
    20 years this kid’s jumped up and down trying to decide whether he wants white
    or red sauce on his spaghetti, and then deciding he made the wrong choice once
    he gets his food. His decisions, ultimately, come down to laziness- a snap judgment
    at the last second- if you’re not seeing the theme here, it’s procrastination.
    This wouldn’t be a problem if he wasn’t going to treat life like a plate of fucking
    pasta, but here we are aren’t we? He’s got a foolish hope that life will just
    set down the perfect opportunity in front of him. Someone really needs to explain
    to him how opportunity works.
  sub_genre: essay
