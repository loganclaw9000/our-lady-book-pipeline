- id: train_filtered_narrative_017
  text: 'Hoarfrost crusts the windows of the ATM enclosure. Bet was lucky last night-
    she’d been able to make it inside with an old debit card she kept around for just
    this scenario. Whatever algo registered her and called the Pinkies must have been
    pretty cheap, it was and the rest of the city was exploding, so no one ever came.


    Shame though, in the morning when she tried to leave her debit card wasn’t working.
    She thought back to the night before.


    Shit. Her gait. The little glass cubicle’s caretaker must have talked to some
    of its neighbors and conspired to have her ID’d and her information canceled.
    Her social credit being what it was the bank could act with impunity in canceling
    her card, charging her a luxury hotel rate for the overnight in the ATM room,
    and locking her inside until the authorities arrived. As I mentioned earlier,
    the caretaker was second rate- so the authorities weren’t forthcoming.


    She put her hand against the glass, the condensation and sudden stab of cold cleared
    her head. It reminded her of Chicago winter. The gale coming in strong off the
    lake and tossing snow up in people’s faces- forcing them to pop their collars
    against it.


    Outside of her little cage, the street was still. It was still around 5 am and
    the night’s cyclone was dying down enough to venture outside, if she could make
    it. She got a ping from Sam.


    “I’m watching you.”


    “Oh yeah?” She answered while running her fingers along the edges of the doorframe,
    looking for some sort of fire release. She found it, but it was keyed at 400 SS
    or above. Shit.


    “Yeah! We’ve got a micro options market going on whether it’ll be sex or debt
    to get out of this one.”


    “Place a side bet and advance me 300 social and we can split the profits 50/50.”


    “Sister if you think I have 300 social to advance my dying mother then I have
    a bridge to sell you.”


    “Cut Jeej in on the action.”


    “Jeej?”


    “Jeej.”


    “No.”'
