- id: train_filtered_essay_006
  text: “My father worked all his life saving up to go see his mother’s homeland.
    He got two weeks of vacation after a total of 40 years on the job. Keeled over
    dead his first day back. I could mention wanting to spend a month there offhandedly
    to Erin right now and wake up there to a homecooked meal from Alfonz- my chef-
    tomorrow morning. I could stay as long as I want and do whatever I want. My father
    just got to walk into the shop, smell the pizza, look at the ovens, and say ‘Wow,
    isn’t that an incredible thing that pizza exists? It smells so good. I’m so humbled
    I was able to experience pizza before I died.’ I can eat the pizza. I can go and
    pay a dollar and eat and throw away in an afternoon what it takes any american
    a lifetime to even get into the room with. Hell; I can buy the whole store, burn
    it down, and be bored by breakfast.”
