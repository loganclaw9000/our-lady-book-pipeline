- id: train_filtered_narrative_016
  text: Upon receiving summons to the Captains quarter’s, Sam walked in the exact
    opposite direction, towards the boiler room rather than the upper decks of the
    ship. In his entry, 049 had described a control mechanism that manipulated the
    dead men ceaselessly. The device, it said, looked like a heart. It rested in the
    corner of the same boiler room Sam had visited before. He carefully removed a
    small piece of cryon from the pile the dead men shoveled, and placed it on top
    of the machine. Then, he ripped a small corner of the poster from the wall, set
    it alight in the boiler, placed it next to the tiny black crystal, and ran. Seconds
    later, an explosion lit up the surrounding corridors and shook the Uganda’s superstructure.
    The dead men inside the boiler room stood awestruck as smoke flooded the lower
    levels of the ship. Among them, 049 seemed to immediately recognize what was happening,
    and swiveled to face Sam at the doorway. He did not seem to be able to speak,
    but he looked at Sam very earnestly, and pointed to a single word on the far wall’s
    poster. “Revolution”.
