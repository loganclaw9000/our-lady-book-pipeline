- id: train_filtered_narrative_019
  text: 'Not metaphorically arrested. Actually hauled in by actual cops. Because in
    1900, if a man bought you dinner and you accepted, you looked indistinguishable
    from a prostitute to the authorities. The whole apparatus we now call "dating",
    the dinner reservation, the movie, the drink at the bar where you both pretend
    to be more interesting than you actually are; was so new and so strange that society
    had no idea what to do with it except panic. Which, honestly, feels about right.
    I spent the better part of two years on Hinge treating the whole enterprise like
    a mildly embarrassing software bug that would eventually get patched. Turns out
    it''s not a bug. It''s not even that old. It''s an invention, like the refrigerator
    or the limited liability corporation, and it was built by the same forces that
    built everything else: money, migration, and people trying to get something they
    needed without admitting exactly what that something was.'
