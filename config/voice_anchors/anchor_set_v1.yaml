  text: 1. Spanky the Cattle Dog lying on a big lawn in front of a big house. 2. Spanky
    in a pound, hurt and scared. 3. Spanky being taken by a kind woman and a scary
    man to a big city. 4. Spanky's reaction to the tall buildings and small houses
    in the city. 5. Spanky barking at strangers in the city. 6. Spanky with his new
    owner, the kind woman. 7. Spanky living happily with his new owner in the city.
    8. Spanky and his owner, a year later. 9. Pancake the Bernese Mountain Dog puppy
    on a farm. 10. Pancake being taken away by a wide man. 11. Pancake in her new
    home with the kind woman and the scary man, and meeting her new friend Spanky.
    12. Pancake exploring her new home by biting everything. 13. Spanky reacting to
    Pancake's biting. 14. Pancake trying to play with Spanky. 15. Pancake's many attempts
    to play with Spanky. 16. Spanky's hatred for Pancake. 17. Pancake making friends
    with all the dogs in the park. 18. Spanky watching Pancake come home safely from
    the park. 19. Pancake getting sick and being taken to the hospital. 20. Pancake
    recovering from her illness. 21. Spanky wondering if he could have been brave
    like Pancake. 22. Spanky, Pancake, the kind woman, and the scary man going on
    a road trip. 23. Spanky arriving at his new home. 24. Spanky playing with Pancake.
    25. Spanky and Pancake playing on their way home. 26. Pancake introducing Spanky
    to her friends in the park. 27. Spanky meeting Pancake's friends. 28. Pancake
    getting sick again. 29. Pancake recovering from her illness. 30. Pancake's death.
    31. Spanky going to the park and making new friends.
