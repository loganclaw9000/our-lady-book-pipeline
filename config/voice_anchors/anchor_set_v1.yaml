- id: train_filtered_analytic_015
  text: 'I’ve wasted hours of my life on builds that consume an API that gets me 90%
    of the way there due to half-reading documentation. If you are a developer, read!
    Have at least a rough sketch of the calls you will be using and what logic you
    need to fill in the gaps. If you are approaching an implementation from the business
    side, don’t buy into a provider without consulting the technical teams who will
    be consuming it.


    So here I am. About to build a new project that is going to touch maybe five different
    services. I know one of them needs to be location but I don’t even know what location
    services are out there. Spending the time to find and evaluate proper dependencies
    is a huge blocker during design.


    Thankfully, Postman has a solution for this: The API Network. It’s a portal that
    allows you to search through thousands of APIs that have been submitted as collections.
    You can even submit one yourself!'
  sub_genre: analytic
