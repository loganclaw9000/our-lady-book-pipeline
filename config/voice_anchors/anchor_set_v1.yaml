  text: 'Story idea: the gallery of right angles


    The house of right?


    L 90?


    Perpendicular?


    As you moved through, the halls lined up like mirror illusions, kaleidoscoping
    to what looked like an infinite distance. Almost as if one were stuck in a colossal
    forest, or crammed between massive pillars some idiot had placed much to close
    to one another.


    The sleep vampires that roamed the halls were awful, gangly, ink-blot things that
    siphon rest from you whenever they were in view.


    So obsessed were they with the right angle that they bound their babies’ spines
    to achieve staircase perfection ridging every back. One might count the notches
    in the same way one might play with their hand, making it a little man and having
    it walk up tiny stairs with fingers as legs. Maybe in your imagination it has
    a tiny businessman’s hat on, and a miniscule newspaper tucked under the thumb.
    Your pinky somehow holds (at a perfect 90 degree angle) a tiny cup of coffee that
    reads “I ♥️ MOM” in old english. He’s on his way up the stairs, coming home from
    work-


    Why is he carrying a cup of coffee and newspaper you may ask, if he is returning
    home? Well, don’t ask. But, if you must: perhaps this handman always carries around
    a newspaper and coffee mug. He probably smokes a little pipe too. I don’t know
    why you imagined the hand smoking a pipe with the hat on wearing *glasses* but
    I did too!


    Anyways, those hand~steps our hand-man is taking up to see his hand-wife and hand-child;
    they are trod on bone.


    So obsessed is the Court of Right, they twist themselves into zig zags and wwwwwwwwwww’s
    and Charlie Brown shirts.'
