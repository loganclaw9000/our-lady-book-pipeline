- id: train_filtered_essay_005
  text: 'I opened this email in an attempt to ask you what your availability was mid
    June, were I to visit England. However, I said I''d write you, and there is no
    better time than 6:29 AM, on a Tuesday.


    I''ve been up since around 3:50. I don''t really know when I went to bed. This
    happens occasionally when I drink. I''ve been drinking more than occasionally
    though, and need to cut back. That''s been on mind- and stomach- for a bit now.
    Whether maybe going sober entirely wouldn''t be a bad decision. I have the rare
    chance of a currently happy and pretty relaxed life, save one or two problems,
    which we will get to in a bit just you wait. You know me, i''m used to slothing
    around. Sloth a bit here, sloth a smidge there, don''t leave the house for a whole
    weekend- you know the drill. Now I haven''t had adequate time for slothage lately
    which I think is a good problem to have: it''s good to be busy.


    Although here''s one thing i''ve noticed about all these meddlesome perfect-lifers
    in New York: they actually do a ton of shit with their freetime. As opposed to
    me, with the videogames and weed and drinking. Now i''m generalizing a bit, but
    I think they may be onto something. I''ve been thinking about that a lot, too,
    how to better use my free time for not getting high and stuff(More on this later).
    It IS a comfortable lifestyle- don''t get me wrong- but probably an unhealthy
    one ultimately.'
  sub_genre: essay
