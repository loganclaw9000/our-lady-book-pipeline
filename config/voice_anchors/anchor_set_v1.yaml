- id: train_filtered_analytic_014
  text: '1. **Token economy:** Word count matters, **a lot**. There’s a sweet spot
    between providing the model a good amount of information to reason with, and being
    so sparse it just repeats exactly what you told it in different words. The trade
    off between the two is that **due to token limits, the bigger the input, the smaller
    the response.** Upping the temperature from the base .7 can inject variance as
    your input gets more sparse.

    2. **Cut the Chaff:** Chapter headings appeared to have no effect on GPT-3’s accuracy
    or organization, so they were cut between drafts 3 and 4 to save on tokens. Lots
    of whitespace in the text seemed to effect the model’s likelihood to correctly
    follow requests to generate per-page image prompts, and was also aggressively
    cut between drafts 3 and 4. **I don’t think this is any sort of significant signal
    of model behavior**. It was likely just normal variance that I’m going all apophenic
    on.

    3. **Correct execution of request prompt:** I found that temperatures above .8
    were less likely to return a text-to-image prompt for every single page, often
    returning between 11-24 prompts, as opposed to the requested 32.

    4. **Request Prompt Shaping:** Leaving out **specific requests for per-page return
    prompts** also led to the model returning too few text-to-image prompts for the
    number of pages provided, even if the input was specified as a children’s book
    and tagged with pages.

    5. **Keep it simple:** Adding in words like ‘vivid,’ ‘detailed,’ ‘imagery’, ‘action,’
    and ‘background’ had the tendency to cause the model to wildly misinterpret my
    desires. At one point it just spit out a list of nouns:'
