- id: train_filtered_analytic_008
  text: 'Two of the examples adapt the pattern by adding the stage direction “coda”
    to Guildenstern’s lines. This addition is an oddity because the term coda is shared
    between the literary and musical field, where it is defined as a passage which
    brings a movement or piece to a conclusion through prolongation. The first occurrence
    happens before R&G take listen to Hamlet talking to Fortinbras’ soldier and then
    accompany him to England: “ROS: There it is again. (In anguish.) All I ask is
    a change of ground!/GUIL (coda): Give us this day our daily round...” (Stoppard
    47). The substitution of “round” in this passage complements the coda nicely,
    as a round can refer to a recurring cycle, such as the repetition of lines in
    a musical piece with a coda or such as R&G’s acting out of the Player’s depiction
    of The Murder of Gonzago. These rounds represent fate- R&G are shown what is to
    happen to them by the players yet ignore the warning and are unable to change
    the eventual outcome despite having their prayers granted by being shown the first
    “round” in The Murder of Gonzago. R&G’s inability to take action in changing their
    fate is shown further later in the play when they discover Hamlet’s change to
    the letter demanding their execution, yet still turn the letter in. The Second
    example of the coda occurs after the pirate attack and Hamlet’s disappearance:
    “ROS: I thought I heard a band. (In anguish.) Plausibility is all I presume!/
    GUIL:(coda) Call us this day our daily tune….” (Stoppard 58) There is irony here
    in the ambiguous use of coda, as both the tune and the prayer are repeating. However,
    after this repetition the play continues, which doesn’t make sense as the function
    of a coda is conclusion and prolongation. Since the coda does not conclude, it
    therefore prolongs. Every line filled with a prayer by R&G is one line extra before
    their eventual death at the end of the play. Although these prayers do not provide
    solace or protection from fate, they extend the time R&G have before fate kills
    them off.'
  sub_genre: analytic
