  text: 'Its pulling its pulling idk what to do


    The massive arm moved and the building began to lean


    Chase''s chair begins to slide slightly as the floor inclined. He furiously navigate
    folders and subfolders looking for tendon controls


    “E13 snapped, e15 fraying”


    Chase looked up to the corner of his screen. E12. Nothing was working. He could
    hear masonry and beams beginning to crack and creeeeeeeak.


    He was entirely locked out. No recourse. He clenched his teeth and took in breath
    sharp as he remembered almost getting fired in october.


    He clicked into a folder he should have deleted and ran the forbidden script


    Were seeing a buffer overload on 12. 12 is slack. A massive wrenching thud went
    through the building


    25 slack. 30, 66, 132. All tendons in critical buffer overflow. We’re at risk
    of losing neuromotor training.


    Dump it, dump it all. Who the fuck needs muscle memory anyways.


    The massive tendon out the window relaxed, graphite plates playing their characteristic
    eerie shuddered clank as they passed over one another. Chase looked out the window
    and up, out to the massive arm that seemed to penetrate the sky, and the even
    bigger skyscraper being hauled up out of the sand beside it.


    That was close. He wiped his forehead, and the hand came away sopping wet. No
    telling where those plates go when tendons snap, but 10 tons of frictionless slip-graphite
    flung at four times the speed of sound tends to turn humans into loosely associated
    clouds of red mist, and buildings into atom clouds. Sometimes they find them embedded
    inside of mountains, or out in the asteroid belt.


    He kisses the cross around his neck, kisses Bertha’s chassy, and swings down the
    ladder to lunch.'
