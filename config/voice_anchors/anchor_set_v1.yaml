- id: train_filtered_analytic_012
  text: '1. Surrogation - a measure of a construct of interest evolves to replace
    that construct.

    2. Campbell''s Law - The more any quantitative social indicator is used for social
    decision-making, the more subject it will be to corruption pressures and the more
    apt it will be to distort and corrupt the social processes it is intended to monitor

    3. Map-Territory Relation - A map *is not* the territory it represents, but, if
    correct, it has a *similar structure* to the territory, which accounts for its
    usefulness.

    4. McNamara Fallacy - Making a decision based solely on quantitative observations
    (or metrics) and ignoring all others.

    5. Goodhart''s Law - "When a measure becomes a target, it ceases to be a good
    measure."

    6. Lucas Critique (economics) It is naive to try to predict the effects of a change
    in economic policy entirely on the basis of relationships observed in historical
    data.

    7. Reification (fallacy) - The error of treating something that is not concrete,
    such as an idea, as a concrete thing.

    8. Overfitting - The production of an analysis that corresponds too closely or
    exactly to a particular set of data, and may therefore fail to fit to additional
    data or predict future observations reliably.

    9. Faulty Generalization - A conclusion is drawn about all or many instances of
    a phenomenon on the basis of one or a few instances of that phenomenon.

    10. Black swan problem // Problem of induction (philosophy) - Rejection of knowledge
    that goes beyond a mere collection of observations.

    11. Perverse Incentive // Cobra Effect - An incentive that has an unintended and
    undesirable result that is contrary to the intentions of its designers.

    12. Instrumental convergence (The Paperclip Problem) - The tendency to pursue
    unbounded instrumental goals.

    13. All models are wrong, but some are useful.'
  sub_genre: analytic
