      - axis: entity
        severity: high
        location: "chapter sc02 vs sc03 — Malintzin location contradiction"
        claim: "Malintzin is simultaneously in Tlaxcalan territory (sc02) and Cempoala (sc03) on the same morning; no travel bridge."
        evidence: "sc02 places her 'two paces behind Cortés' crossing the Tlaxcalan causeway at dawn; sc03 places her 'in the cacique's courtyard' in Cempoala the same morning. Entity continuity across scenes is broken — either scene is internally coherent but the chapter is not."
        citation: null
