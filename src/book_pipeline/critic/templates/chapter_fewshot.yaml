    ---

    <!-- scene: ch02_sc02 -->
    They marched three days through the hot coastal lowland and into the
    first of the Tlaxcalan foothills. Malintzin walked with the baggage
    train, her cloak heavy with dust. Each night she sat close to the
    fire and listened to the Totonac escort practice Spanish phrases, and
    each dawn she rose before the horses. On the fourth morning they
    reached a cold stream that marked the edge of the republic's land.
    The Totonac captain would go no farther.

