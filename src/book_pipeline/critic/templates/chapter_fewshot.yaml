# One bad + one good few-shot for the CHAPTER critic system prompt.
# Curated at Plan 04-02 Task 2 time against Chapter 1-2 outline beats.
# Load-bearing for CRIT-02 calibration — Opus reads them inside the cached
# chapter-critic system prompt. Scene-level critique lives in scene_fewshot.yaml;
# this file exercises cross-scene coherence (entity drift, arc pacing, rule-card
# contradictions spanning scenes).
#
# Bad example: 3-scene chapter where Malintzin's location contradicts silently
# between sc02 (Cempoala) and sc03 (Tlaxcala) with NO travel bridge. The entity
# axis fails at chapter scale because the drift is only visible across scenes
# — each individual scene passes its own scene critic.
#
# Good example: 3-scene chapter where scene progression is coherent — Malintzin
# crosses from Cempoala up to the Tlaxcalan border with an intervening travel
# beat visible on-page. All 5 axes pass at chapter scale.

bad:
  chapter_text: |
    <!-- scene: ch02_sc01 -->
    Cortés stood on the basalt steps of the Cempoala temple, the afternoon
    heat pressing against his breastplate. Malintzin, at his shoulder,
    rendered the fat cacique's grievances into Spanish with the flat care
    of a scribe — four generations of Mexica tribute, three hundred boys
    given up to the obsidian, grain carried off in the dry season. Andrés
    de Tapia wrote it down. They would leave at dawn.

    ---

    <!-- scene: ch02_sc02 -->
    Morning broke over the Tlaxcalan causeway. Malintzin crossed into the
    republic's territory two paces behind Cortés, her face still,
    her footfalls even on the loose stone. The Totonac escort had turned
    back at the ridge. Xicotencatl's runners had been spotted at dawn;
    by noon there would be obsidian on the horizon. She had not slept.
    Cortés had not spoken since before the sunrise, which meant he was
    thinking, which usually meant he was counting swords.

    ---

    <!-- scene: ch02_sc03 -->
    In Cempoala that same morning, Malintzin stood in the cacique's
    courtyard and waited for a second embassy from Tenochtitlan. The fat
    cacique had asked her to stay. She understood why — these were
    Moctezuma's men, and a woman who spoke Nahuatl mattered when Mexica
    envoys came. She would translate for them as she had for Cortés. A
    servant brought cold chocolate. Outside, the tzompantli drum began
    its slow afternoon hymn.
