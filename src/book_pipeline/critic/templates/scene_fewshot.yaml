good:
  scene_text: |
    Malintzin stood one pace behind Cortés in the shade of the temple
    stair, her hands folded, her face still. It was the afternoon of a
    hot August day in 1519, and the cacique of Cempoala — the Totonac
    lord the Spaniards already called the fat cacique, though never to
    his face — sat on a low bench of carved cedar, waiting. Cortés
    spoke first, in Spanish. "Tell him we bring greetings from a
    prince across the sea who honors his hospitality." Malintzin waited
    two breaths, then rendered it into Nahuatl, her voice low and even,
    and a young Totonac interpreter beside the cacique turned it into
    the coastal tongue. The cacique's jaw worked. He had already said,
    that morning, what he wanted said: that Moctezuma's tax-collectors
    had bled Cempoala for three generations, and that if these strangers
    had come to break the yoke, the Totonacs would feed them and fight
    beside them. But none of that could be spoken yet, not under the
    eyes of the Mexica envoys still in the plaza. Malintzin understood
    the silence perfectly. She waited for the cacique to choose his
    next word, and rendered that word, too.
