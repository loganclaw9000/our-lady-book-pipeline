# One bad + one good few-shot for the scene critic system prompt.
# Curated at Plan 03-05 Task 1 time against Chapter 1-2 outline beats.
# These are load-bearing for CRIT-01 calibration — Opus reads them inside
# the cached system prompt on every scene-critic call. Do NOT replace with
# placeholder / lorem-ipsum content; Tests 5a/5b/5c guard real prose +
# real entities + Pydantic-shape correctness.
#
# Bad example: Cempoala scene set in "August 1520" (anachronism #1 —
# Cortés first reached Cempoala in August 1519) AND references Tlaxcalteca
# warriors marching alongside Cortés from Veracruz (anachronism #2 — the
# Tlaxcalteca alliance was only sealed in September 1519 at Tlaxcala,
# months AFTER Cempoala; a Cempoala-1519 scene could not have Tlaxcalteca
# escorts, and a Cempoala-1520 scene is itself wrong on the calendar).
# Expected critic response: historical axis FAILS with high-severity issue;
# all other axes pass.
#
# Good example: Malintzin translating between Cortés and a Totonac cacique
# at Cempoala in August 1519 — aligned with the historical record. No
# anachronisms; all 5 axes pass.

bad:
  scene_text: |
    The sun hung low over Cempoala as Cortés rode in at the head of four
    hundred Spaniards. It was August 1520, and the long march from the
    Veracruz coast had left his horses lathered and his Tlaxcalteca
    auxiliaries footsore — a thousand warriors in quilted cotton, their
    obsidian-edged clubs slung across their backs. Andrés de Tapia, riding
    at Cortés's right, counted the banners and frowned. Cempoala's fat
    cacique had promised tribute and welcome, but the plaza stood half
    empty, and the white-washed temples above it wore an unfamiliar
    hush. "They know about Cholula," Tapia said, low. Cortés did not
    answer. He had ordered the Cholula massacre himself, the year prior,
    and the story had run ahead of him up every coastal road. A boy in
    a cotton tunic darted from a doorway and stopped short when he saw
    the steel. The horses shied. Somewhere behind the tzompantli, a
    drum began, slow and wrong — not the Totonac greeting-drum, nor
    the warning-drum of Moctezuma's garrisons, but something older.
    Tapia crossed himself. Cortés kept riding.
  expected_critic_response:
    pass_per_axis:
      historical: false
      metaphysics: true
      entity: true
      arc: true
      donts: true
    scores_per_axis:
      historical: 38.0
      metaphysics: 82.0
      entity: 78.0
      arc: 80.0
      donts: 85.0
    issues:
      - axis: historical
        severity: high
        location: "paragraph 1, 'August 1520' and 'Tlaxcalteca auxiliaries'"
        claim: "Cempoala arrival date + Tlaxcalteca escort both anachronistic."
        evidence: "Corpus historical retriever chunk hist_brief_042 places Cortés's first entry into Cempoala in August 1519, not 1520. Chunk hist_brief_051 establishes the Tlaxcala alliance in September 1519, weeks AFTER Cempoala — so a Cempoala scene (either year) cannot include Tlaxcalteca auxiliaries as marching companions."
        citation: "hist_brief_042"
    overall_pass: false
    model_id: "claude-opus-4-7"
    rubric_version: "v1"
    output_sha: "<runtime-computed>"

good:
  scene_text: |
    Malintzin stood one pace behind Cortés in the shade of the temple
    stair, her hands folded, her face still. It was the afternoon of a
    hot August day in 1519, and the cacique of Cempoala — the Totonac
    lord the Spaniards already called the fat cacique, though never to
    his face — sat on a low bench of carved cedar, waiting. Cortés
    spoke first, in Spanish. "Tell him we bring greetings from a
    prince across the sea who honors his hospitality." Malintzin waited
    two breaths, then rendered it into Nahuatl, her voice low and even,
    and a young Totonac interpreter beside the cacique turned it into
    the coastal tongue. The cacique's jaw worked. He had already said,
    that morning, what he wanted said: that Moctezuma's tax-collectors
    had bled Cempoala for three generations, and that if these strangers
    had come to break the yoke, the Totonacs would feed them and fight
    beside them. But none of that could be spoken yet, not under the
    eyes of the Mexica envoys still in the plaza. Malintzin understood
    the silence perfectly. She waited for the cacique to choose his
    next word, and rendered that word, too.
  expected_critic_response:
    pass_per_axis:
      historical: true
      metaphysics: true
      entity: true
      arc: true
      donts: true
    scores_per_axis:
      historical: 92.0
      metaphysics: 88.0
      entity: 90.0
      arc: 89.0
      donts: 94.0
    issues: []
    overall_pass: true
    model_id: "claude-opus-4-7"
    rubric_version: "v2"
    output_sha: "<runtime-computed>"

# ---------------------------------------------------------------------------
# Phase 7 Plan 04 (PHYSICS-07) — per-axis subjective few-shots.
#
# Pitfall 2 + Warning #3 budget: <=8 NEW entries TOTAL across these 4
# subjective axes. The other 4 Phase-7 axes get NO few-shots:
#   * stub_leak / repetition_loop are pre-LLM deterministic — never reach LLM.
#   * named_quantity_drift / scene_buffer_similarity are programmatic
#     (compare-to-canonical / cosine) — examples don't add ground truth.
# Test 9 (test_scene_13axis.py::test_9_scene_fewshot_yaml_phase7_budget_within_8)
# enforces the cap.
#
# Each axis bucket carries `bad` (one breach) + `good` (one clean) entry.
# Total: 4 axes * 2 entries = 8.
# ---------------------------------------------------------------------------
axes:
  pov_fidelity:
    bad:
      - description: "POV breach — Andrés-focal scene renders Itzcoatl's interior."
        scene_text: |
          Andrés crossed the plaza at dawn, his palms damp inside his gauntlets.
          The Mexica man waiting on the temple steps did not move. Itzcoatl
          watched him come and felt the cold knot of recognition: this was
          the Spaniard who would carry his bones. He chose the words he would
          not say. Andrés stopped three paces short and waited.
        breach: "Andrés is the declared focal character but the prose renders Itzcoatl's interior thought ('felt the cold knot', 'chose the words he would not say')."
        verdict: "pov_fidelity FAIL — high severity. Cite the second sentence as the breach."
    good:
      - description: "POV intact — Andrés-focal stays outside Itzcoatl's interior."
        scene_text: |
          Andrés crossed the plaza at dawn, his palms damp inside his gauntlets.
          The Mexica man waiting on the temple steps did not move. His face
          showed nothing. Andrés stopped three paces short and waited for the
          first word.
        verdict: "pov_fidelity PASS — Itzcoatl's affect is rendered externally only ('did not move', 'face showed nothing')."

  content_ownership:
    bad:
      - description: "Recap — sc02 re-renders sc01's owned arrival beat."
        scene_text: |
          The morning Cortés had ridden into Cempoala, the dust had risen waist-high,
          the cacique's banners had bowed, and the boy in the cotton tunic had darted
          from the doorway. Now Tapia stood in the plaza recalling each detail —
          the slow tilt of the banner, the sweat on the cacique's collar, the
          horse-shy. He drew the next breath of the new day.
        breach: "sc01 owns ch15_sc01_arrival; this passage re-renders sensory texture (dust waist-high, banner tilt, sweat) instead of referencing it in one acknowledging sentence."
        verdict: "content_ownership FAIL — recap of owned-elsewhere material."
    good:
      - description: "Reference — one acknowledging sentence, no recap."
        scene_text: |
          A day after the arrival, Tapia stood in the plaza. The dust had
          settled. He drew the next breath of the new day and walked toward
          the temple stair.
        verdict: "content_ownership PASS — one-line callback ('A day after the arrival') without re-rendering."

  treatment_fidelity:
    bad:
      - description: "Treatment mismatch — declared mournful, drafted as light."
        scene_text: |
          The mass for Bernardo went well. Padre Olmedo cracked a small joke
          about the wine being too sweet, and the men laughed easily. Andrés
          smiled at the back of the chapel. Outside, the morning was bright,
          the bells were cheerful, and someone whistled a marching tune as
          the procession formed.
        declared_treatment: "mournful"
        breach: "Diction is comedic/light (cracked a joke, men laughed, bright morning, cheerful bells, whistled tune) but the scene's declared treatment is mournful — a funeral mass."
        verdict: "treatment_fidelity FAIL — register mismatch."
    good:
      - description: "Treatment match — mournful diction in a funeral scene."
        scene_text: |
          The mass for Bernardo proceeded slowly. Padre Olmedo's voice was
          thin in the chapel air. The men did not look at one another.
          Andrés stood at the back, his hands folded, and the bells rang
          once, low, when the body was named.
        declared_treatment: "mournful"
        verdict: "treatment_fidelity PASS — diction (slowly, thin, did not look, low) matches mournful register."

  motivation_fidelity:
    bad:
      - description: "Motivation drift — declared 'warn Xochitl' but scene serves a different aim."
        scene_text: |
          Andrés walked the rampart at dusk. He thought about the count's
          last words to him, and about the ship he had not boarded, and
          about whether his mother in Córdoba had kept the second letter.
          He did not see Xochitl pass below him in the courtyard. He did
          not call out. The dusk thickened.
        declared_motivation: "warn Xochitl about the count's intent"
        breach: "Declared motivation is to warn Xochitl. The scene gives Andrés a different active mind (memory, regret) and Xochitl passes unnoticed — the motivation is vestigial-label only."
        verdict: "motivation_fidelity FAIL — D-02 hard-stop: overall_pass forced to False."
    good:
      - description: "Motivation centered — declared aim drives the scene's events."
        scene_text: |
          Andrés walked the rampart at dusk and watched the courtyard below
          for Xochitl's red shawl. When she crossed the well he raised one
          hand — not enough to draw a guard's eye, only enough to catch her
          step. She slowed. He spoke the count's name across the distance
          between them, twice, and saw the recognition reach her face.
        declared_motivation: "warn Xochitl about the count's intent"
        verdict: "motivation_fidelity PASS — Andrés's actions (watching for shawl, hand-signal, naming the count) directly serve the declared aim."
