title: Our Lady of Champion
description: Autonomous-pipeline first-draft novel. Voice = paul-voice FT (Qwen3.5-27B LoRA). Critic = Claude Opus 4.7.
theme: jekyll-theme-cayman
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Reader feedback Worker endpoint (Cloudflare). When unset / placeholder,
# the JS form falls back to a mailto: draft so visitors are never silently
# dropped. Set after running `wrangler deploy` in /worker.
feedback_worker_url: "REPLACE_AFTER_WRANGLER_DEPLOY"
feedback_mailto: "pauljflogan+ourlady@gmail.com"

exclude:
  - ADRs/
  - ARCHITECTURE.md
  - README.md

defaults:
  - scope:
      path: "chapters"
    values:
      layout: default
  - scope:
      path: "retrospectives"
    values:
      layout: default
